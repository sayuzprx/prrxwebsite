    <script type="module">
        import * as THREE from 'three';
        const canvas = document.getElementById('bg-canvas');
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x050b1a);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000); camera.position.set(0, 0, 5);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        const geometry = new THREE.TorusKnotGeometry(1.1, 0.28, 160, 24, 3, 4);
        const material = new THREE.MeshStandardMaterial({ color: 0x00e0ff, emissive: 0x1a4c8a, emissiveIntensity: 0.5 });
        const torusKnot = new THREE.Mesh(geometry, material); scene.add(torusKnot);
        const particleCount = 1200;
        const particlesGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const radius = 2.5 + Math.random() * 2.5;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            positions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
            positions[i*3+2] = radius * Math.cos(phi);
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleSystem = new THREE.Points(particlesGeometry, new THREE.PointsMaterial({ color: 0x66ccff, size: 0.04 }));
        scene.add(particleSystem);
        const ringGeo = new THREE.TorusGeometry(1.6, 0.04, 48, 400);
        const ring = new THREE.Mesh(ringGeo, new THREE.MeshStandardMaterial({ color: 0x00aaff, emissive: 0x0088ff, emissiveIntensity: 0.4 }));
        scene.add(ring);
        const ambientLight = new THREE.AmbientLight(0x111122); scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x2266ff, 0.8); pointLight.position.set(2, 3, 4); scene.add(pointLight);
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for (let i = 0; i < 600; i++) { starPos.push((Math.random() - 0.5) * 150); starPos.push((Math.random() - 0.5) * 80); starPos.push((Math.random() - 0.5) * 40 - 15); }
        starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.06 }));
        scene.add(stars);
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            torusKnot.rotation.x += 0.008; torusKnot.rotation.y += 0.012;
            ring.rotation.x = Math.sin(time * 0.5) * 0.3; ring.rotation.y += 0.01;
            particleSystem.rotation.y += 0.0005;
            stars.rotation.y += 0.0002;
            camera.lookAt(0, 0, 0);
            renderer.render(scene, camera);
            time += 0.008;
        }
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
    <script>
        // ========== LOADING SCREEN ==========
        let loadingProgress = 0;
        const percentageElement = document.getElementById('loadingPercentage');
        function updateLoadingProgress() {
            const interval = setInterval(() => {
                loadingProgress += Math.random() * 12;
                if (loadingProgress >= 100) { loadingProgress = 100; clearInterval(interval); }
                if (percentageElement) percentageElement.textContent = Math.floor(loadingProgress) + '%';
            }, 120);
        }
        
        function createLoadingParticles() {
            const container = document.getElementById('loadingParticles');
            if (!container) return;
            for (let i = 0; i < 80; i++) {
                const particle = document.createElement('div');
                particle.className = 'loading-particle';
                particle.style.left = Math.random() * window.innerWidth + 'px';
                particle.style.top = window.innerHeight + Math.random() * 150 + 'px';
                particle.style.setProperty('--x', (Math.random() - 0.5) * 150 + 'px');
                particle.style.animationDelay = Math.random() * 2 + 's';
                particle.style.animationDuration = 1.5 + Math.random() * 1.5 + 's';
                container.appendChild(particle);
            }
        }
        
        updateLoadingProgress();
        createLoadingParticles();
        
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loadingScreen = document.getElementById('loadingScreen');
                loadingScreen.classList.add('hidden');
                setTimeout(() => { if (loadingScreen) loadingScreen.style.display = 'none'; }, 600);
            }, 1400);
        });
        
        // ========== ULTRA SECURE ENCRYPTION ==========
        const ENCRYPTION_KEY = 'PRRX_KEYAUTH_ULTRA_SECURE_2026';
        
        function encryptData(data) {
            let encrypted = '';
            for (let i = 0; i < data.length; i++) {
                const keyChar = ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length);
                const dataChar = data.charCodeAt(i);
                encrypted += String.fromCharCode(dataChar ^ keyChar);
            }
            return btoa(encrypted);
        }
        
        function decryptData(encryptedData) {
            try {
                const decoded = atob(encryptedData);
                let decrypted = '';
                for (let i = 0; i < decoded.length; i++) {
                    const keyChar = ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length);
                    const dataChar = decoded.charCodeAt(i);
                    decrypted += String.fromCharCode(dataChar ^ keyChar);
                }
                return decrypted;
            } catch(e) { return null; }
        }
        
        const SecureStorage = {
            set: (key, value) => { localStorage.setItem(`secure_${key}`, encryptData(JSON.stringify(value))); },
            get: (key) => {
                const encrypted = localStorage.getItem(`secure_${key}`);
                if (!encrypted) return null;
                try { return JSON.parse(decryptData(encrypted)); } catch(e) { return null; }
            },
            remove: (key) => localStorage.removeItem(`secure_${key}`)
        };
        
        // ========== HWID GENERATION ==========
        function generateHWID() {
            const components = [
                navigator.userAgent,
                navigator.language,
                screen.width + 'x' + screen.height,
                screen.colorDepth,
                new Date().getTimezoneOffset(),
                navigator.hardwareConcurrency || 4,
                navigator.deviceMemory || 4,
                navigator.platform,
                navigator.maxTouchPoints || 0,
                window.screen.pixelDepth
            ];
            let hash = 0;
            const str = components.join('|');
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash).toString(16).toUpperCase();
        }
        
        const CURRENT_HWID = generateHWID();

            showToast("🔍 Verifying user credentials with KeyAuth...");
            
            try {
                const response = await fetch(`${KEYAUTH_CONFIG.apiUrl}`, {
                    method: 'POST',

                        type: "login",
                        user: username,
                        pass: password,
                        name: KEYAUTH_CONFIG.name,
                        ownerid: KEYAUTH_CONFIG.ownerid,
                        ver: KEYAUTH_CONFIG.version,
                        hwid: CURRENT_HWID
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const userInfo = {
                        type: "user",
                        username: username,
                        key: "N/A",
                        expiry: data.info?.expiry || "Premium Account",
                        hwid: CURRENT_HWID,
                        verifiedAt: new Date().toISOString(),
                        lastLogin: new Date().toISOString(),
                        loginCount: 1
                    };
                    
                    SecureStorage.set('keyauth_session', userInfo);
                    currentUser = userInfo;
                    showToast(`✅ Welcome ${username}! Premium access granted.`);
                    renderPremiumDashboard(userInfo);
                    return true;
                } else {
                    showToast(`❌ Login failed: ${data.message || "Invalid credentials"}`);
                    return false;
                }
            } catch (error) {
                console.error("KeyAuth Error:", error);
                showToast("❌ Connection error. Please try again.");
                return false;
            }
        }
        
        // ========== KEYAUTH LICENSE LOGIN (License Key Only) ==========
        async function keyAuthLicenseLogin(licenseKey) {
            showToast("🔍 Verifying license with KeyAuth...");
            
            try {
                const response = await fetch(`${KEYAUTH_CONFIG.apiUrl}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: "license",
                        key: licenseKey,
                        name: KEYAUTH_CONFIG.name,
                        ownerid: KEYAUTH_CONFIG.ownerid,
                        ver: KEYAUTH_CONFIG.version,
                        hwid: CURRENT_HWID
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const userInfo = {
                        type: "license",
                        username: data.username || "License User",
                        key: licenseKey,
                        expiry: data.expiry || "Lifetime",
                        hwid: CURRENT_HWID,
                        verifiedAt: new Date().toISOString(),
                        lastLogin: new Date().toISOString(),
                        loginCount: 1
                    };
                    
                    SecureStorage.set('keyauth_session', userInfo);
                    currentUser = userInfo;
                    showToast(`✅ License verified! Welcome ${userInfo.username}`);
                    renderPremiumDashboard(userInfo);
                    return true;
                } else {
                    showToast(`❌ Invalid license: ${data.message || "License not found"}`);
                    return false;
                }
            } catch (error) {
                console.error("KeyAuth Error:", error);
                showToast("❌ Connection error. Please try again.");
                return false;
            }
        }
        
        // ========== CHECK SESSION ==========
        function checkSession() {
            const session = SecureStorage.get('keyauth_session');
            if (session && session.hwid === CURRENT_HWID) {
                currentUser = session;
                renderPremiumDashboard(session);
                return true;
            }
            return false;
        }
        
        // ========== LOGOUT ==========
        function logout() {
            SecureStorage.remove('keyauth_session');
            currentUser = null;
            showToast("🔒 Logged out successfully");
            renderLoginPage();
        }
        
        // ========== RENDER LOGIN PAGE WITH TWO TABS ==========
        function renderLoginPage() {
            document.getElementById('appContainer').innerHTML = `
                <div class="premium-card fade-up">
                    <div class="premium-header">
                        <i class="fas fa-crown"></i>
                        <h2>Premium KeyAuth Login</h2>
                        <p>Choose your login method</p>
                    </div>
                    
                    <div class="hwid-box">
                        <i class="fas fa-microchip"></i> Device HWID: <span style="color:#00e0ff;">${CURRENT_HWID.substring(0, 20)}...</span>
                        <br><small style="color:#ffaa00;">⚠️ Your premium account will be locked to this HWID</small>
                    </div>
                    
                    <div class="tabs">
                        <button class="tab-btn active" id="userTabBtn"><i class="fas fa-user"></i> User Login</button>
                        <button class="tab-btn" id="licenseTabBtn"><i class="fas fa-key"></i> License Login</button>
                    </div>
                    
                    <div id="userLoginForm">
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" id="username" placeholder="KeyAuth Username" autocomplete="off">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="KeyAuth Password" autocomplete="off">
                        </div>
                        <button class="submit-btn" id="userLoginBtn"><i class="fas fa-sign-in-alt"></i> Login with User Account</button>
                    </div>
                    
                    <div id="licenseLoginForm" style="display: none;">
                        <div class="input-group">
                            <i class="fas fa-key"></i>
                            <input type="text" id="licenseKey" placeholder="XXXXX-XXXXX-XXXXX-XXXXX" autocomplete="off">
                        </div>
                        <button class="submit-btn" id="licenseLoginBtn"><i class="fas fa-check-circle"></i> Login with License Key</button>
                    </div>
                    
                    <div class="back-link">
                        <a href="dashboard.html"><i class="fas fa-arrow-left"></i> Back to Dashboard Selection</a>
                    </div>
                    
                    <div style="margin-top: 1rem; text-align: center; font-size: 0.65rem; color: #8e9eb5;">
                        <i class="fas fa-shield-alt"></i> KeyAuth Premium Protected | HWID Locked | E2E Encrypted
                    </div>
                </div>
            `;
            
            // Tab switching
            const userTab = document.getElementById('userTabBtn');
            const licenseTab = document.getElementById('licenseTabBtn');
            const userForm = document.getElementById('userLoginForm');
            const licenseForm = document.getElementById('licenseLoginForm');
            
            userTab.addEventListener('click', () => {
                userTab.classList.add('active');
                licenseTab.classList.remove('active');
                userForm.style.display = 'block';
                licenseForm.style.display = 'none';
            });
            
            licenseTab.addEventListener('click', () => {
                licenseTab.classList.add('active');
                userTab.classList.remove('active');
                userForm.style.display = 'none';
                licenseForm.style.display = 'block';
            });
            
            // User Login
            document.getElementById('userLoginBtn').addEventListener('click', () => {
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                if (!username || !password) {
                    showToast("❌ Please enter username and password");
                    return;
                }
                keyAuthUserLogin(username, password);
            });
            
            // License Login
            document.getElementById('licenseLoginBtn').addEventListener('click', () => {
                const licenseKey = document.getElementById('licenseKey').value.trim();
                if (!licenseKey) {
                    showToast("❌ Please enter your license key");
                    return;
                }
                keyAuthLicenseLogin(licenseKey);
            });
            
            // Enter key press
            document.getElementById('username')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('userLoginBtn').click(); });
            document.getElementById('password')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('userLoginBtn').click(); });
            document.getElementById('licenseKey')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('licenseLoginBtn').click(); });
        }
        
        // ========== PREMIUM DASHBOARD ==========
        function renderPremiumDashboard(userInfo) {
            const verifiedDate = new Date(userInfo.verifiedAt).toLocaleDateString();
            const lastLogin = userInfo.lastLogin ? new Date(userInfo.lastLogin).toLocaleString() : 'First login';
            const loginType = userInfo.type === 'user' ? 'User Account' : 'License Key';
            const loginIcon = userInfo.type === 'user' ? 'fa-user' : 'fa-key';
            
            document.getElementById('appContainer').innerHTML = `
                <div class="dashboard-card fade-up">
                    <div class="user-avatar">
                        <i class="fas ${loginIcon}"></i>
                    </div>
                    <h2>${userInfo.username}</h2>
                    <p><i class="fas fa-crown" style="color: #ffd700;"></i> Premium Member</p>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="label">Login Method</div>
                            <div class="value">${loginType}</div>
                        </div>
                        ${userInfo.type === 'license' ? `
                        <div class="info-item">
                            <div class="label">License Key</div>
                            <div class="value" style="font-size: 0.7rem;">${userInfo.key.substring(0, 16)}...</div>
                        </div>
                        ` : ''}
                        <div class="info-item">
                            <div class="label">Expiry</div>
                            <div class="value" style="color: #4caf50;">${userInfo.expiry}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Verified On</div>
                            <div class="value">${verifiedDate}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Last Login</div>
                            <div class="value">${lastLogin}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">HWID Status</div>
                            <div class="value" style="color: #4caf50;">Locked ✓</div>
                        </div>
                    </div>
                    
                    <div class="premium-badge">
                        <i class="fas fa-gem"></i> PRRX Premium Active
                        <div style="font-size: 0.7rem; margin-top: 0.3rem;">✨ All features unlocked | Priority Support | Lifetime Updates</div>
                    </div>
                    
                    <div class="hwid-locked">
                        <i class="fas fa-fingerprint"></i> HWID Locked: ${CURRENT_HWID.substring(0, 20)}...
                        <br><small>This premium account is locked to this device</small>
                    </div>
                    
                    <div style="background: linear-gradient(90deg, #ffd70020, #ffaa0020); border-radius: 16px; padding: 0.8rem; margin: 1rem 0;">
                        <i class="fas fa-check-circle" style="color: #ffd700;"></i> Premium Features Unlocked:
                        <div style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem;">
                            <span style="background: rgba(255,215,0,0.2); padding: 0.2rem 0.5rem; border-radius: 20px; font-size: 0.65rem;">AIMBOT Pro</span>
                            <span style="background: rgba(255,215,0,0.2); padding: 0.2rem 0.5rem; border-radius: 20px; font-size: 0.65rem;">ESP Ultimate</span>
                            <span style="background: rgba(255,215,0,0.2); padding: 0.2rem 0.5rem; border-radius: 20px; font-size: 0.65rem;">Anti-Cheat Elite</span>
                            <span style="background: rgba(255,215,0,0.2); padding: 0.2rem 0.5rem; border-radius: 20px; font-size: 0.65rem;">24/7 Priority Support</span>
                        </div>
                    </div>
                    
                    <button class="logout-btn" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                    
                    <div class="back-link" style="margin-top: 1rem;">
                        <a href="dashboard.html"><i class="fas fa-arrow-left"></i> Back to Dashboard Selection</a>
                    </div>
                </div>
            `;
            
            document.getElementById('logoutBtn').addEventListener('click', logout);
        }
        
        // ========== ANTI-DEBUGGING ==========
        let devToolsOpen = false;
        setInterval(() => {
            const start = performance.now();
            debugger;
            const end = performance.now();
            if (end - start > 100 && !devToolsOpen) {
                devToolsOpen = true;
                document.getElementById('antiDevTools').classList.add('active');
            }
        }, 2000);
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || 
                (e.ctrlKey && e.key === 'u') || (e.ctrlKey && e.key === 'U') ||
                (e.ctrlKey && e.key === 's') || (e.ctrlKey && e.key === 'S')) {
                e.preventDefault();
                showToast("🔒 Ultra Secure: Action blocked");
                return false;
            }
        });
        
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); showToast("🔒 Right-click disabled"); return false; });
        document.addEventListener('selectstart', (e) => e.preventDefault());
        if (window.self !== window.top) { window.top.location = window.self.location; }
        
        // Custom Cursor
        if (window.innerWidth > 768) {
            const cd = document.querySelector('.cursor-dot'), co = document.querySelector('.cursor-outline');
            if (cd && co) {
                document.addEventListener('mousemove', (e) => {
                    cd.style.transform = `translate(${e.clientX - 4}px, ${e.clientY - 4}px)`;
                    co.style.transform = `translate(${e.clientX - 16}px, ${e.clientY - 16}px)`;
                });
                document.querySelectorAll('a, button, .premium-card, .dashboard-card').forEach(el => {
                    el.addEventListener('mouseenter', () => { co.style.width = '48px'; co.style.height = '48px'; co.style.borderColor = '#a020f0'; });
                    el.addEventListener('mouseleave', () => { co.style.width = '32px'; co.style.height = '32px'; co.style.borderColor = 'rgba(0,224,255,0.6)'; });
                });
            }
        }
        
        // Scroll animations
        const fadeElements = document.querySelectorAll('.fade-up');
        const observer = new IntersectionObserver((e) => { e.forEach(entry => { if (entry.isIntersecting) { entry.target.classList.add('visible'); observer.unobserve(entry.target); } }); }, { threshold: 0.1 });
        fadeElements.forEach(el => observer.observe(el));
        
        // Initialize
        if (!checkSession()) { renderLoginPage(); }
        
        console.log("%c👑 PRRX KEYAUTH PREMIUM ACTIVE", "color: #ffd700; font-size: 14px; font-weight: bold;");
        console.log(`%cDevice HWID: ${CURRENT_HWID}`, "color: #a020f0; font-size: 11px;");
        console.log(`%cKeyAuth: ${KEYAUTH_CONFIG.name} | User Login & License Login Available`, "color: #00e0ff; font-size: 11px;");
        console.log("%c⚠️ HWID Lock Active | Premium Account Locked to This Device", "color: #ffaa00; font-size: 11px;");
    </script>
</body>
</html>
