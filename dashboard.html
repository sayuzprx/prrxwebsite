<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PRRX | Google Login Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Ultra Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://unpkg.com https://www.gstatic.com https://apis.google.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
        font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;
        img-src 'self' data: https: https://lh3.googleusercontent.com;
        connect-src 'self' https://*.firebaseio.com https://*.googleapis.com;
        frame-src 'self' https://*.google.com;
        frame-ancestors 'none';
    ">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Background Animation */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(46,204,113,0.05) 0%, transparent 50%);
            animation: rotateBg 20s linear infinite;
        }
        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Particle Canvas */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        
        /* Main Content */
        .content {
            position: relative;
            z-index: 2;
            max-width: 500px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .content.visible { opacity: 1; }
        
        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 1px solid rgba(46,204,113,0.3);
        }
        .logo { 
            font-size: 1.5rem; 
            font-weight: 800; 
            background: linear-gradient(135deg, #fff, #2ecc71); 
            -webkit-background-clip: text; 
            background-clip: text; 
            color: transparent; 
            text-decoration: none;
        }
        .menu { display: flex; gap: 2rem; }
        .menu a { 
            color: #fff; 
            text-decoration: none; 
            font-weight: 500; 
            transition: all 0.3s;
            position: relative;
        }
        .menu a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0%;
            height: 2px;
            background: #2ecc71;
            transition: width 0.3s;
        }
        .menu a:hover::after { width: 100%; }
        .menu a:hover { color: #2ecc71; }
        
        /* Login Card */
        .login-card {
            background: rgba(20,20,20,0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 2.5rem;
            text-align: center;
            border: 1px solid rgba(46,204,113,0.3);
            animation: fadeInUp 0.5s ease;
        }
        .login-card i { font-size: 4rem; color: #2ecc71; margin-bottom: 1rem; }
        .login-card h2 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .login-card p { color: #888; margin-bottom: 1.5rem; }
        
        /* Google Button */
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            width: 100%;
            padding: 0.8rem;
            background: #fff;
            border: none;
            border-radius: 50px;
            color: #333;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .google-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .google-btn i { font-size: 1.2rem; color: #4285F4; margin: 0; }
        
        /* Dashboard Card */
        .dashboard-card {
            background: rgba(20,20,20,0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 2rem;
            border: 1px solid rgba(46,204,113,0.3);
            text-align: center;
            animation: fadeInUp 0.5s ease;
        }
        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            overflow: hidden;
        }
        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user-name { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.3rem; }
        .user-email { font-size: 0.8rem; color: #888; margin-bottom: 1.5rem; }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1.5rem 0;
            padding: 1rem;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
        }
        .info-item .label { font-size: 0.7rem; color: #888; }
        .info-item .value { font-size: 1rem; font-weight: 600; color: #2ecc71; }
        .logout-btn {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255,80,80,0.2);
            border: 1px solid #ff5050;
            border-radius: 40px;
            color: #ff5050;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        .logout-btn:hover { background: #ff5050; color: #fff; }
        
        /* Custom Cursor */
        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.05s ease;
            box-shadow: 0 0 10px #2ecc71;
        }
        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(46,204,113,0.6);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transition: transform 0.15s ease, width 0.2s, height 0.2s;
            backdrop-filter: blur(2px);
        }
        @media (max-width: 768px) { .cursor-dot, .cursor-outline { display: none; } }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2ecc71;
            color: #0a0a0a;
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 10000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }
        .toast.show { transform: translateX(0); }
        
        .anti-devtools {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 20000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(20px);
        }
        .anti-devtools.active { display: flex; }
        .anti-devtools i { font-size: 4rem; color: #ff5050; margin-bottom: 1rem; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @media (max-width: 768px) {
            .content { padding: 5rem 1rem 2rem; }
            .navbar { padding: 0.8rem 1rem; }
            .menu { gap: 1rem; }
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #2ecc71; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-particles" id="loadingParticles"></div>
        <div class="loading-logo">PRRX</div>
        <div class="loading-spinner"></div>
        <div class="loading-progress-container">
            <div class="loading-progress"><div class="loading-progress-bar"></div></div>
            <div class="loading-percentage" id="loadingPercentage">0%</div>
        </div>
        <div class="loading-text">
            Initializing Secure Dashboard
            <span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>
        </div>
        <div class="loading-security">
            <i class="fas fa-shield-alt"></i> Google Authentication
            <i class="fas fa-lock"></i> E2E Encrypted
        </div>
    </div>

    <div class="bg-animation"></div>
    <canvas id="particleCanvas"></canvas>
    
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <div class="anti-devtools" id="antiDevTools">
        <i class="fas fa-shield-horned"></i>
        <p>⚠️ SECURITY ALERT: Developer Tools Detected<br>Please close DevTools to continue.</p>
    </div>

    <div class="navbar">
        <a href="index.html" class="logo">PRRX</a>
        <div class="menu">
            <a href="index.html">HOME</a>
            <a href="features.html">FEATURES</a>
            <a href="live-chat.html">CHAT</a>
            <a href="dashboard.html" style="color: #2ecc71;">DASHBOARD</a>
        </div>
    </div>

    <div class="content" id="mainContent">
        <div id="app"></div>
    </div>
    
    <div id="toast" class="toast"></div>

    <script>
        // ========== FIREBASE CONFIGURATION ==========
        const firebaseConfig = {
            apiKey: "AIzaSyCrRkBSSsLJkPQLFSetLSvyfaJ0IihZWKg",
            authDomain: "prrx-chat.firebaseapp.com",
            databaseURL: "https://prrx-chat-default-rtdb.firebaseio.com",
            projectId: "prrx-chat",
            storageBucket: "prrx-chat.firebasestorage.app",
            messagingSenderId: "763130047676",
            appId: "1:763130047676:web:e6566f250e81b9c6b574b9",
            measurementId: "G-SQ0GGFJ704"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();
        
        // ========== ULTRA SECURE ENCRYPTION ==========
        const ENCRYPTION_KEY = 'PRRX_GOOGLE_SECURE_KEY_2026';
        
        function encryptData(data) {
            let encrypted = '';
            for (let i = 0; i < data.length; i++) {
                const keyChar = ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length);
                const dataChar = data.charCodeAt(i);
                encrypted += String.fromCharCode(dataChar ^ keyChar);
            }
            return btoa(encrypted);
        }
        
        function decryptData(encryptedData) {
            try {
                const decoded = atob(encryptedData);
                let decrypted = '';
                for (let i = 0; i < decoded.length; i++) {
                    const keyChar = ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length);
                    const dataChar = decoded.charCodeAt(i);
                    decrypted += String.fromCharCode(dataChar ^ keyChar);
                }
                return decrypted;
            } catch(e) { return null; }
        }
        
        const SecureStorage = {
            set: (key, value) => { localStorage.setItem(`secure_${key}`, encryptData(JSON.stringify(value))); },
            get: (key) => {
                const encrypted = localStorage.getItem(`secure_${key}`);
                if (!encrypted) return null;
                try { return JSON.parse(decryptData(encrypted)); } catch(e) { return null; }
            },
            remove: (key) => localStorage.removeItem(`secure_${key}`)
        };
        
        // ========== UI FUNCTIONS ==========
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ========== RENDER LOGIN SCREEN ==========
        function renderLoginScreen() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="login-card">
                    <i class="fab fa-google"></i>
                    <h2>Welcome to PRRX</h2>
                    <p>Sign in with your Google account to access the dashboard</p>
                    <button class="google-btn" id="googleLoginBtn">
                        <i class="fab fa-google"></i>
                        Sign in with Google
                    </button>
                </div>
            `;
            
            document.getElementById('googleLoginBtn').onclick = () => {
                auth.signInWithPopup(provider)
                    .then((result) => {
                        const user = result.user;
                        SecureStorage.set('google_user', {
                            uid: user.uid,
                            name: user.displayName,
                            email: user.email,
                            photoURL: user.photoURL,
                            lastLogin: Date.now()
                        });
                        showToast(`✅ Welcome ${user.displayName}!`);
                        renderDashboard(user);
                    })
                    .catch((error) => {
                        console.error("Google login error:", error);
                        showToast("❌ Login failed: " + error.message);
                    });
            };
        }
        
        // ========== RENDER DASHBOARD ==========
        function renderDashboard(user) {
            const joinedDate = new Date(user.metadata.creationTime).toLocaleDateString();
            const lastLogin = new Date(user.metadata.lastSignInTime).toLocaleString();
            
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="dashboard-card">
                    <div class="user-avatar">
                        ${user.photoURL ? `<img src="${user.photoURL}" alt="Profile">` : `<i class="fas fa-user"></i>`}
                    </div>
                    <div class="user-name">${escapeHtml(user.displayName || 'User')}</div>
                    <div class="user-email">${escapeHtml(user.email)}</div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="label">Account Created</div>
                            <div class="value">${joinedDate}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Last Login</div>
                            <div class="value">${lastLogin}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">User ID</div>
                            <div class="value" style="font-size: 0.7rem;">${user.uid.substring(0, 12)}...</div>
                        </div>
                        <div class="info-item">
                            <div class="label">Auth Provider</div>
                            <div class="value">Google</div>
                        </div>
                    </div>
                    
                    <div style="background: rgba(46,204,113,0.1); border-radius: 16px; padding: 0.8rem; margin: 1rem 0;">
                        <i class="fas fa-gem"></i> PRRX Premium Access
                        <div style="font-size: 0.7rem; color:#888;">Google Authenticated | Secure Session</div>
                    </div>
                    
                    <button class="logout-btn" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            `;
            
            document.getElementById('logoutBtn').onclick = () => {
                auth.signOut().then(() => {
                    SecureStorage.remove('google_user');
                    showToast("🔒 Logged out successfully");
                    renderLoginScreen();
                }).catch((error) => {
                    showToast("❌ Logout failed");
                });
            };
        }
        
        // ========== CHECK AUTH STATE ==========
        auth.onAuthStateChanged((user) => {
            if (user) {
                const savedUser = SecureStorage.get('google_user');
                if (savedUser && savedUser.uid === user.uid) {
                    renderDashboard(user);
                } else {
                    SecureStorage.set('google_user', {
                        uid: user.uid,
                        name: user.displayName,
                        email: user.email,
                        photoURL: user.photoURL,
                        lastLogin: Date.now()
                    });
                    renderDashboard(user);
                }
            } else {
                renderLoginScreen();
            }
        });
        
        // ========== LOADING SCREEN ==========
        let loadingProgress = 0;
        const percentageElement = document.getElementById('loadingPercentage');
        
        function updateLoadingProgress() {
            const interval = setInterval(() => {
                loadingProgress += Math.random() * 12;
                if (loadingProgress >= 100) {
                    loadingProgress = 100;
                    clearInterval(interval);
                }
                if (percentageElement) percentageElement.textContent = Math.floor(loadingProgress) + '%';
            }, 100);
        }
        
        function createLoadingParticles() {
            const container = document.getElementById('loadingParticles');
            if (!container) return;
            for (let i = 0; i < 80; i++) {
                const particle = document.createElement('div');
                particle.className = 'loading-particle';
                particle.style.left = Math.random() * window.innerWidth + 'px';
                particle.style.top = window.innerHeight + Math.random() * 150 + 'px';
                particle.style.setProperty('--x', (Math.random() - 0.5) * 150 + 'px');
                particle.style.animationDelay = Math.random() * 2 + 's';
                particle.style.animationDuration = 1.5 + Math.random() * 1.5 + 's';
                container.appendChild(particle);
            }
        }
        
        updateLoadingProgress();
        createLoadingParticles();
        
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loadingScreen = document.getElementById('loadingScreen');
                loadingScreen.classList.add('hidden');
                document.getElementById('mainContent').classList.add('visible');
                setTimeout(() => {
                    if (loadingScreen) loadingScreen.style.display = 'none';
                }, 600);
            }, 1800);
        });
        
        // ========== PARTICLE SYSTEM ==========
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouseX = 0, mouseY = 0;
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.color = `rgba(46, 204, 113, ${this.opacity})`;
            }
            update() {
                const dx = this.x - mouseX;
                const dy = this.y - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 120) {
                    const angle = Math.atan2(dy, dx);
                    const force = (120 - dist) / 120;
                    this.x += Math.cos(angle) * force * 1.5;
                    this.y += Math.sin(angle) * force * 1.5;
                }
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }
        
        function initParticles() {
            particles = [];
            for (let i = 0; i < 180; i++) particles.push(new Particle());
        }
        
        function animateParticles() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        
        // ========== MOUSE TRACKING ==========
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            const cd = document.querySelector('.cursor-dot');
            const co = document.querySelector('.cursor-outline');
            if (cd && co) {
                cd.style.transform = `translate(${e.clientX - 4}px, ${e.clientY - 4}px)`;
                co.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
            }
        });
        
        // ========== ANTI-DEBUGGING ==========
        let devToolsOpen = false;
        setInterval(() => {
            const start = performance.now();
            debugger;
            const end = performance.now();
            if (end - start > 100 && !devToolsOpen) {
                devToolsOpen = true;
                document.getElementById('antiDevTools').classList.add('active');
            }
        }, 2000);
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) {
                e.preventDefault();
                showToast("🔒 DevTools blocked");
                return false;
            }
        });
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); showToast("🔒 Right-click disabled"); return false; });
        
        // ========== INIT ==========
        resizeCanvas();
        initParticles();
        animateParticles();
        
        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });
        
        console.log("%c🔐 PRRX ULTRA SECURE GOOGLE LOGIN ACTIVE", "color: #2ecc71; font-size: 14px");
        console.log("%c✅ Google Authentication | E2E Encryption | Anti-DevTools", "color: #3498db; font-size: 12px");
        console.log("%c🔒 No HWID | No Passwords | Secure by Google", "color: #f39c12; font-size: 12px");
    </script>
</body>
</html>
