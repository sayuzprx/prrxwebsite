            top: 0;
            left: 0;

        }
        .bg-animation::before {
            content: '';

            height: 200%;

        }

            width: 8px;
            height: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.05s ease;
            box-shadow: 0 0 10px #2ecc71;
        }
        .cursor-outline {

        .toast.show { transform: translateX(0); }

        @media (max-width: 768px) {
            .navbar { padding: 0.8rem 1rem; }
            .menu { gap: 1rem; }
            .user-sidebar { width: 100%; }
        }
    </style>
</head>

        // ========== E2E ENCRYPTION ==========

        function encryptData(data) {
            let encrypted = '';
            for (let i = 0; i < data.length; i++) {
                const keyChar = ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length);
                const dataChar = data.charCodeAt(i);

        function decryptData(encryptedData) {
            try {
                const decoded = atob(encryptedData);
                let decrypted = '';
                for (let i = 0; i < decoded.length; i++) {
                    const keyChar = ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length);
                    const dataChar = decoded.charCodeAt(i);
                    decrypted += String.fromCharCode(dataChar ^ keyChar);
                }
                return decrypted;
            } catch(e) { return null; }
        }
        
        const SecureStorage = {
            set: (key, value) => { localStorage.setItem(`secure_${key}`, encryptData(JSON.stringify(value))); },
            get: (key) => {
                const encrypted = localStorage.getItem(`secure_${key}`);
                if (!encrypted) return null;
                try { return JSON.parse(decryptData(encrypted)); } catch(e) { return null; }
            },
            remove: (key) => localStorage.removeItem(`secure_${key}`)
        };
        
        // ========== AI RESPONSE ==========
        let aiLearningMemory = [];
        
        function loadLearnedResponses() {
            const learned = SecureStorage.get('ai_learned');

            const exists = aiLearningMemory.find(item => item.question.toLowerCase() === question.toLowerCase());
            if (!exists) {
                aiLearningMemory.push({ question: question, answer: answer, learnedAt: new Date().toISOString() });
                SecureStorage.set('ai_learned', aiLearningMemory);

        async function getAIResponse(userMessage, username) {
            const learnedResponse = getLearnedResponse(userMessage);

            try {
                const recentHistory = conversationHistory.slice(-5);

                if (data.error) return fallbackResponse(userMessage);
                
                let aiResponse = data.candidates[0].content.parts[0].text;
                aiResponse = aiResponse.replace(/PRRX Bot:/gi, '').trim();
                saveLearnedResponse(userMessage, aiResponse);
                return aiResponse;
            } catch (error) {
                return fallbackResponse(userMessage);
            }
        }
        
        function fallbackResponse(message) {
            const lowerMsg = message.toLowerCase();
            if (lowerMsg.includes('aimbot')) return "🎯 AIMBOT: Go to Settings Menu > AIM ASSISTANCE. Toggle AIMBOT +++ for max accuracy!";
            if (lowerMsg.includes('esp')) return "👁️ Visual Enhancement: Use CHAMS MENU for player highlighting and ESP for location tracking!";
            if (lowerMsg.includes('price')) return "💰 PRRX Plans: 1 Week - 300 LKR | 1 Month - 850 LKR | 1 Year - 2299 LKR";
            if (lowerMsg.includes('download')) return "📥 Download: https://github.com/sayuzprx/prrxwebsite/releases/download/v3.2/PRRX.HEX.1.rar";
            if (lowerMsg.includes('help')) return "📋 I can help with: AIMBOT, ESP, Anti-Cheat, Prices, Download. Just ask!";
            return "I'm here to help! Ask me about AIMBOT, ESP, Anti-Cheat, pricing, or download.";
        }
        
        // ========== CHAT SYSTEM ==========
        let currentUser = null;
        let messages = [];
        let onlineUsers = [];
        let searchTerm = '';
        
        function loadMessages() {
            const saved = SecureStorage.get('chat_messages');
            messages = saved ? saved : [];
            saveMessages();
            return messages;
        }
        
        function saveMessages() {
            SecureStorage.set('chat_messages', messages);
        }
        
        function addMessage(sender, message, isOwn = false, isBot = false) {
            const newMsg = {
                id: Date.now(),
                sender: sender,
                message: message,
                time: new Date().toLocaleTimeString(),
                isOwn: isOwn,
                isBot: isBot
            };
            messages.push(newMsg);
            saveMessages();
            if (!isBot) {
                conversationHistory.push({ sender: sender, message: message });
                if (conversationHistory.length > 20) conversationHistory.shift();
            }
            return newMsg;
        }
        
        function updateOnlineUsers() {
            const savedUsers = SecureStorage.get('chat_users');
            onlineUsers = savedUsers ? savedUsers.filter(u => u.online) : [];
            let filtered = onlineUsers;
            if (searchTerm) {
                filtered = onlineUsers.filter(u => u.username.toLowerCase().includes(searchTerm.toLowerCase()));
            }
            renderUserList(filtered);
            const countSpan = document.getElementById('onlineCount');
            if (countSpan) countSpan.textContent = onlineUsers.length;
        }
        
        function renderUserList(users) {
            const userListDiv = document.getElementById('userList');
            if (!userListDiv) return;
            if (users.length === 0) {
                userListDiv.innerHTML = '<div style="text-align:center; padding:1rem; color:#666;">No users online</div>';
                return;
            }
            userListDiv.innerHTML = users.map(user => `
                <div class="user-item online" onclick="startPrivateChat('${user.username}')">
                    <div class="user-avatar">${user.username.charAt(0).toUpperCase()}</div>
                    <div class="user-name">${user.username} ${user.username === currentUser?.username ? '(You)' : ''}</div>
                </div>
            `).join('');
        }
        
        function renderMessages() {
            const messagesDiv = document.getElementById('messages');
            if (!messagesDiv) return;
            messagesDiv.innerHTML = messages.map(msg => `
                <div class="message ${msg.isOwn ? 'message-own' : ''} ${msg.isBot ? 'bot-message' : ''}">
                    <div class="message-avatar">${msg.isBot ? '<i class="fas fa-robot"></i>' : msg.sender.charAt(0).toUpperCase()}</div>
                    <div class="message-content">
                        <div class="message-sender">${msg.sender} ${msg.isBot ? '(AI Bot)' : ''}</div>
                        <div class="message-text">${escapeHtml(msg.message).replace(/\n/g, '<br>')}</div>
                        <div class="message-time">${msg.time}</div>
                    </div>
                </div>
            `).join('');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function showTypingIndicator() {
            const messagesDiv = document.getElementById('messages');
            if (!messagesDiv) return;
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing-indicator';
            typingDiv.className = 'typing-indicator';
            typingDiv.innerHTML = '<span></span><span></span><span></span><span style="color:#888; margin-left:5px;">AI is thinking...</span>';
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function removeTypingIndicator() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || !currentUser) return;
            addMessage(currentUser.username, message, true, false);

            showTypingIndicator();

                addMessage("PRRX AI Bot", aiResponse, false, true);

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        function leaveChat() {
            if (currentUser) {
                onlineUsers = onlineUsers.filter(u => u.username !== currentUser.username);
                SecureStorage.set('chat_users', onlineUsers);
            }
            currentUser = null;
            showToast("Left chat");
            showJoinScreen();
        }
        
        function renderChatInterface() {
            const app = document.getElementById('app');
            if (!app) return;
            
            app.innerHTML = `
                <div class="chat-container">
                    <div class="user-sidebar">
                        <h3><i class="fas fa-users"></i> Online Users</h3>
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="Search users..." onkeyup="searchUsers()">
                            <button onclick="searchUsers()"><i class="fas fa-search"></i></button>
                        </div>
                        <div class="user-list" id="userList"></div>
                        <div class="online-count"><i class="fas fa-circle" style="color:#2ecc71; font-size:0.6rem;"></i> <span id="onlineCount">0</span> users online</div>
                    </div>
                    
                    <div class="chat-main">
                        <div class="chat-header">
                            <h3><i class="fas fa-robot"></i> AI-Powered Chat - Welcome ${currentUser?.username}!</h3>
                        </div>
                        <div class="chat-messages" id="messages"></div>
                        <div class="chat-input-area">
                            <input type="text" id="messageInput" placeholder="Ask me anything about PRRX Panel..." onkeypress="if(event.key==='Enter') sendMessage()">
                            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Send</button>
                            <button onclick="leaveChat()" class="leave-btn"><i class="fas fa-sign-out-alt"></i> Leave</button>
                            <button onclick="clearChat()" class="clear-btn"><i class="fas fa-trash"></i> Clear</button>
                        </div>
                    </div>
                </div>
            `;
            
            renderMessages();
            updateOnlineUsers();
        }
        
        function showJoinScreen() {
            const app = document.getElementById('app');
            if (!app) return;
            
            app.innerHTML = `
                <div class="join-screen">
                    <i class="fas fa-robot"></i>
                    <h2>PRRX AI-Powered Chat</h2>
                    <p style="color: #888; margin-bottom: 1rem;">🤖 Powered by Google Gemini AI | E2E Encrypted</p>
                    <input type="text" id="usernameInput" placeholder="Enter your username" maxlength="20" autocomplete="off">
                    <button id="joinBtn">Join Chat</button>
                    <p style="color: #666; font-size: 0.7rem; margin-top: 1rem;">Messages are E2E encrypted | Be respectful</p>
                </div>
            `;
            
            const joinBtn = document.getElementById('joinBtn');
            const usernameInput = document.getElementById('usernameInput');
            
            if (joinBtn) {
                joinBtn.onclick = () => {
                    const username = usernameInput?.value.trim();
                    if (!username) {
                        showToast("❌ Please enter a username");
                        return;
                    }
                    if (username.length < 2) {
                        showToast("❌ Username must be at least 2 characters");
                        return;
                    }
                    
                    currentUser = { username: username };
                    
                    let users = SecureStorage.get('chat_users') || [];
                    if (!users.find(u => u.username === username)) {
                        users.push({ username: username, online: true });
                        SecureStorage.set('chat_users', users);
                    }
                    
                    loadMessages();
                    
                    if (messages.length === 0) {
                        addMessage("PRRX AI Bot", `Welcome to PRRX Live Chat, ${username}! 👋\n\nI'm your AI assistant. Ask me about AIMBOT, ESP, Anti-Cheat, pricing, or anything about PRRX Panel!`, false, true);
                    } else {
                        addMessage("System", `${username} joined the chat`, false, false);
                    }
                    
                    renderChatInterface();
                    setInterval(() => updateOnlineUsers(), 5000);
                };
            }
            
            if (usernameInput) {
                usernameInput.onkeypress = (e) => {
                    if (e.key === 'Enter') joinBtn?.click();
                };
            }
        }
        
        // ========== ANTI-DEBUGGING ==========
        setInterval(() => {
            const start = performance.now();
            debugger;
            if (performance.now() - start > 100) {
                document.body.style.opacity = '0.5';
                setTimeout(() => { document.body.style.opacity = '1'; }, 100);
            }
        }, 3000);
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) {
                e.preventDefault();
                showToast("🔒 Security: DevTools blocked");
                return false;
            }
        });
        
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); showToast("🔒 Right-click disabled"); return false; });
        
        // ========== CURSOR ==========
        if (window.innerWidth > 768) {
            const cd = document.querySelector('.cursor-dot');
            const co = document.querySelector('.cursor-outline');
            document.addEventListener('mousemove', (e) => {
                cd.style.transform = `translate(${e.clientX - 4}px, ${e.clientY - 4}px)`;
                co.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
            });
        }
        
        // ========== INIT ==========
        loadLearnedResponses();
        showJoinScreen();
        
        console.log("%c🤖 PRRX AI-POWERED LIVE CHAT ACTIVE", "color: #2ecc71; font-size: 14px");
        console.log("%c🔐 E2E Encrypted | Google Gemini AI | Open Chat", "color: #3498db; font-size: 12px");
        
        window.sendMessage = sendMessage;
        window.clearChat = clearChat;
        window.searchUsers = searchUsers;
        window.startPrivateChat = startPrivateChat;
        window.leaveChat = leaveChat;
    </script>
</body>
</html>
