            { keywords: ['!tip', 'tip'], response: "💡 **Tip:** Use Key Bind to quickly toggle features in-game! Press F2 for AIMBOT!" }

        function getBotResponse(message) {
            const lowerMsg = message.toLowerCase();
            for (let item of botResponses) {
                for (let keyword of item.keywords) {
                    if (lowerMsg.includes(keyword)) {
                        return item.response;
                    }
                }
            }
            const randomResponses = [
                "That's interesting! Need help? Type `!help` for commands! 🎮",
                "PRRX has awesome features! Want to know more? Type `!aimbot` or `!esp`!",
                "Great to have you here! Ask me anything about PRRX! 💪",
                "Type `!help` to see what I can do! 😊"
            ];
            return randomResponses[Math.floor(Math.random() * randomResponses.length)];
        }
        
        // ========== E2E ENCRYPTION ==========
        const ENCRYPTION_KEY = 'PRRX_CHAT_E2E_KEY_2026';
        
        function encryptData(data) {
            let encrypted = '';
            for (let i = 0; i < data.length; i++) {
                const keyChar = ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length);
                const dataChar = data.charCodeAt(i);
                encrypted += String.fromCharCode(dataChar ^ keyChar);
            }
            return btoa(encrypted);
        }
        
        function decryptData(encryptedData) {
            try {
                const decoded = atob(encryptedData);
                let decrypted = '';
                for (let i = 0; i < decoded.length; i++) {
                    const keyChar = ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length);
                    const dataChar = decoded.charCodeAt(i);
                    decrypted += String.fromCharCode(dataChar ^ keyChar);
                }
                return decrypted;
            } catch(e) { return null; }
        }
        
        const SecureStorage = {
            set: (key, value) => { localStorage.setItem(`secure_${key}`, encryptData(JSON.stringify(value))); },
            get: (key) => {
                const encrypted = localStorage.getItem(`secure_${key}`);
                if (!encrypted) return null;
                try { return JSON.parse(decryptData(encrypted)); } catch(e) { return null; }
            },
            remove: (key) => localStorage.removeItem(`secure_${key}`)
        };
        
        // ========== CHAT STATE ==========
        let currentUser = null;
        let currentRoom = 'public';
        let messages = {
            public: [],
            private: {}
        };
        let onlineUsers = [];
        
        // ========== LOAD/SAVE MESSAGES ==========
        function loadMessages() {
            const saved = SecureStorage.get('chat_data');
            if (saved) {
                messages = saved.messages || { public: [], private: {} };
                onlineUsers = saved.onlineUsers || [];
            }
        }
        
        function saveMessages() {
            SecureStorage.set('chat_data', { messages: messages, onlineUsers: onlineUsers });
        }
        
        // Process mentions
        function processMentions(message, sender) {
            const mentionRegex = /@(\w+)/g;
            let processedMessage = message;
            let mentions = [];
            let match;
            
            while ((match = mentionRegex.exec(message)) !== null) {
                const mentionedUser = match[1];
                if (onlineUsers.find(u => u.username === mentionedUser)) {
                    mentions.push(mentionedUser);
                    processedMessage = processedMessage.replace(`@${mentionedUser}`, `<span class="mention">@${mentionedUser}</span>`);
                }
            }
            return { processedMessage, mentions };
        }
        
        function addMessage(room, sender, message, isOwn = false, isBot = false, isAI = false) {
            const { processedMessage, mentions } = processMentions(message, sender);
            
            const newMsg = {
                id: Date.now(),
                sender: sender,
                message: processedMessage,
                rawMessage: message,
                mentions: mentions,
                time: new Date().toLocaleTimeString(),
                isOwn: isOwn,
                isBot: isBot,
                isAI: isAI
            };
            
            if (room === 'public') {
                messages.public.push(newMsg);
                if (messages.public.length > 100) messages.public.shift();
                
                if (mentions.length > 0 && !isOwn && !isBot) {
                    mentions.forEach(mentioned => {
                        if (currentUser && mentioned === currentUser.username) {
                            showToast(`🔔 You were mentioned by ${sender}!`);
                        }
                    });
                }
            } else {
                if (!messages.private[room]) messages.private[room] = [];
                messages.private[room].push(newMsg);
                if (messages.private[room].length > 100) messages.private[room].shift();
            }
            saveMessages();
            return newMsg;
        }
        
        // ========== AI RESPONSE ==========
        async function getAIResponse(userMessage) {
            try {
                const contextMessage = PRRX_KNOWLEDGE + `\n\nUser: ${userMessage}\n\nPRRX AI:`;
                const response = await fetch(`${GEMINI_URL}?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: contextMessage }] }],
                        generationConfig: { temperature: 0.7, maxOutputTokens: 200 }
                    })
                });
                const data = await response.json();
                if (data.error) return "I'm here to help! Ask about AIMBOT, ESP, Anti-Cheat, pricing, or download.";
                return data.candidates[0].content.parts[0].text.replace(/PRRX AI:/gi, '').trim();
            } catch (error) {
                return "Sorry, having trouble connecting. Please try again!";
            }
        }
        
        // ========== RENDER FUNCTIONS ==========
        function renderMessages() {
            const container = document.getElementById('messages');
            if (!container) return;
            
            let roomMessages = [];
            if (currentRoom === 'public') {
                roomMessages = messages.public;
            } else {
                roomMessages = messages.private[currentRoom] || [];
            }
            
            container.innerHTML = roomMessages.map(msg => `
                <div class="message ${msg.isOwn ? 'message-own' : ''}">
                    <div class="message-avatar">${msg.isBot ? '<i class="fas fa-robot"></i>' : (msg.isAI ? '<i class="fas fa-brain"></i>' : msg.sender.charAt(0).toUpperCase())}</div>
                    <div class="message-content">
                        <div class="message-sender">${msg.sender} ${msg.isBot ? '(Bot)' : (msg.isAI ? '(AI)' : '')}</div>
                        <div class="message-text">${msg.message.replace(/\n/g, '<br>')}</div>
                        <div class="message-time">${msg.time}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        function renderOnlineUsers() {
            const container = document.getElementById('onlineUsersList');
            if (!container) return;
            container.innerHTML = onlineUsers.map(user => `
                <div class="user-item" onclick="startPrivateChat('${user.username}')">

                    <div class="user-name">${user.username}</div>
                    <div class="online-dot"></div>
                </div>

        }
        
        function updateUserCount() {
            const countSpan = document.getElementById('onlineCount');
            if (countSpan) countSpan.textContent = onlineUsers.length;

            const container = document.getElementById('messages');

            const typing = document.createElement('div');

            typing.className = 'typing-indicator';
            typing.innerHTML = '<span></span><span></span><span></span><span style="color:#888;">AI is thinking...</span>';

            container.scrollTop = container.scrollHeight;

            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();

            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || !currentUser) return;
            
            if (currentRoom === 'public') {
                addMessage('public', currentUser.username, message, true, false, false);
                renderMessages();
                input.value = '';
                
                setTimeout(() => {
                    const botResponse = getBotResponse(message);
                    addMessage('public', 'PRRX Bot', botResponse, false, true, false);
                    renderMessages();
                }, 500);
            } else if (currentRoom === 'ai_assistant') {
                addMessage('ai_assistant', currentUser.username, message, true, false, false);
                renderMessages();
                input.value = '';
                showTypingIndicator();
                const aiResponse = await getAIResponse(message);
                removeTypingIndicator();
                addMessage('ai_assistant', 'PRRX AI', aiResponse, false, false, true);
                renderMessages();
            } else {
                addMessage(currentRoom, currentUser.username, message, true, false, false);
                renderMessages();
                input.value = '';
                showToast(`Message sent to ${currentRoom}`);
            }
        }
        
        function joinPublicChat() {
            currentRoom = 'public';
            document.getElementById('roomName').textContent = '💬 Public Chat';
            renderMessages();
            updateActiveRoomButtons();
        }
        
        function joinAIChat() {
            currentRoom = 'ai_assistant';
            document.getElementById('roomName').textContent = '🤖 AI Assistant (Gemini)';
            renderMessages();
            updateActiveRoomButtons();
        }
        
        function startPrivateChat(username) {
            if (username === currentUser.username) {
                showToast("You can't chat with yourself");
                return;
            }
            currentRoom = username;
            document.getElementById('roomName').textContent = `💬 Private Chat with ${username}`;
            renderMessages();
            updateActiveRoomButtons();
        }
        
        function updateActiveRoomButtons() {
            const publicBtn = document.getElementById('publicRoomBtn');
            const aiBtn = document.getElementById('aiRoomBtn');
            if (publicBtn && aiBtn) {
                if (currentRoom === 'public') {
                    publicBtn.classList.add('active');
                    aiBtn.classList.remove('active');
                } else if (currentRoom === 'ai_assistant') {
                    aiBtn.classList.add('active');
                    publicBtn.classList.remove('active');
                } else {
                    publicBtn.classList.remove('active');
                    aiBtn.classList.remove('active');
                }
            }
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        function renderChatInterface() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="chat-layout">
                    <div class="sidebar">
                        <h3><i class="fas fa-users"></i> Online Users (<span id="onlineCount">0</span>)</h3>
                        <div class="online-users" id="onlineUsersList"></div>
                        
                        <div class="room-selector">
                            <button class="room-btn active" id="publicRoomBtn" onclick="joinPublicChat()">
                                <i class="fas fa-globe"></i> Public Chat (Bot)
                            </button>
                            <button class="room-btn" id="aiRoomBtn" onclick="joinAIChat()">
                                <i class="fas fa-brain"></i> AI Assistant (Gemini)
                            </button>
                        </div>
                    </div>
                    
                    <div class="chat-main">
                        <div class="chat-header">
                            <h3><i class="fas fa-comments"></i> <span id="roomName">💬 Public Chat</span></h3>
                            <div class="user-badge"><i class="fas fa-user"></i> ${currentUser.username}</div>
                        </div>
                        <div class="chat-messages" id="messages"></div>
                        <div class="chat-input-area">
                            <input type="text" id="messageInput" placeholder="Type a message... Use @username to mention someone" onkeypress="if(event.key==='Enter') sendMessage()">
                            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Send</button>
                        </div>
                    </div>
                </div>
            `;
            
            renderMessages();
            renderOnlineUsers();
            updateUserCount();
            updateActiveRoomButtons();
        }
        
        function showJoinScreen() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="join-screen">
                    <i class="fas fa-comments"></i>
                    <h2>PRRX Live Chat</h2>
                    <p style="color: #888; margin-bottom: 0.5rem;">🤖 Public Bot | 🧠 AI Assistant | @mentions</p>
                    <p style="color: #2ecc71; margin-bottom: 1rem;">🔐 E2E Encrypted | Anti-DevTools</p>
                    <input type="text" id="usernameInput" placeholder="Enter your username" maxlength="20">
                    <button id="joinBtn">Join Secure Chat</button>
                </div>
            `;
            
            document.getElementById('joinBtn').onclick = () => {
                const username = document.getElementById('usernameInput').value.trim();
                if (!username) { showToast("Please enter a username"); return; }
                if (username.length < 2) { showToast("Username must be at least 2 characters"); return; }
                
                currentUser = { username: username };
                
                if (!onlineUsers.find(u => u.username === username)) {
                    onlineUsers.push({ username: username });
                    saveMessages();
                }
                
                addMessage('public', 'PRRX Bot', `🎉 Welcome ${username}! 🎉\n\n${COMMANDS_LIST}`, false, true, false);
                
                if (!messages.private['ai_assistant'] || messages.private['ai_assistant'].length === 0) {
                    addMessage('ai_assistant', 'PRRX AI', `Hello ${username}! I'm your AI assistant powered by Google Gemini. Ask me anything about PRRX Panel! 🤖`, false, false, true);
                }
                
                renderChatInterface();
                setInterval(() => {
                    renderOnlineUsers();
                    updateUserCount();
                }, 5000);
            };
            
            document.getElementById('usernameInput').onkeypress = (e) => {
                if (e.key === 'Enter') document.getElementById('joinBtn').click();
            };
        }
        
        // ========== ULTRA SECURITY - ANTI-DEBUGGING ==========
        let devToolsOpen = false;
        setInterval(() => {
            const start = performance.now();
            debugger;
            const end = performance.now();
            if (end - start > 100 && !devToolsOpen) {
                devToolsOpen = true;
                document.getElementById('antiDevTools').classList.add('active');
            }
        }, 2000);
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) {
                e.preventDefault();
                showToast("🔒 DevTools blocked");
                return false;
            }
        });
        
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); showToast("🔒 Right-click disabled"); return false; });
        
        // Prevent text selection
        document.addEventListener('selectstart', (e) => e.preventDefault());
        
        // Prevent iframe embedding
        if (window.self !== window.top) {
            window.top.location = window.self.location;
        }
        
        // ========== CURSOR ==========
        if (window.innerWidth > 768) {
            const cd = document.querySelector('.cursor-dot');
            const co = document.querySelector('.cursor-outline');
            document.addEventListener('mousemove', (e) => {
                cd.style.transform = `translate(${e.clientX - 4}px, ${e.clientY - 4}px)`;
                co.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
            });
        }
        
        // ========== INIT ==========
        loadMessages();
        showJoinScreen();
        
        window.sendMessage = sendMessage;
        window.joinPublicChat = joinPublicChat;
        window.joinAIChat = joinAIChat;
        window.startPrivateChat = startPrivateChat;
        
        console.log("%c🔐 PRRX ULTRA SECURE CHAT ACTIVE", "color: #2ecc71; font-size: 14px");
        console.log("%c🤖 Public Bot | 🧠 Gemini AI | @mentions", "color: #f39c12; font-size: 12px");
        console.log("%c🔒 E2E Encrypted | Anti-DevTools | No HWID Required", "color: #3498db; font-size: 12px");
    </script>
</body>
</html>
