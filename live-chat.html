            if (searchTerm) {
                filtered = onlineUsers.filter(u => 
                    u.username.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }
            renderUserList(filtered);
            
            const countSpan = document.getElementById('onlineCount');
            if (countSpan) countSpan.textContent = onlineUsers.length;
        }
        
        function renderUserList(users) {
            const userListDiv = document.getElementById('userList');
            if (!userListDiv) return;
            
            if (users.length === 0) {
                userListDiv.innerHTML = '<div style="text-align:center; padding:1rem; color:#666;">No users online</div>';
                return;
            }
            
            userListDiv.innerHTML = users.map(user => `
                <div class="user-item online" onclick="startPrivateChat('${user.username}')">
                    <div class="user-avatar">${user.username.charAt(0).toUpperCase()}</div>
                    <div class="user-name">${user.username} ${user.username === currentUser?.username ? '(You)' : ''}</div>
                </div>
            `).join('');
        }
        
        function renderMessages() {
            const messagesDiv = document.getElementById('messages');
            if (!messagesDiv) return;
            
            messagesDiv.innerHTML = messages.map(msg => `
                <div class="message ${msg.isOwn ? 'message-own' : ''} ${msg.isBot ? 'bot-message' : ''}">
                    <div class="message-avatar">${msg.isBot ? '<i class="fas fa-robot"></i>' : msg.sender.charAt(0).toUpperCase()}</div>
                    <div class="message-content">
                        <div class="message-sender">${msg.sender} ${msg.isBot ? '(AI Bot)' : ''}</div>
                        <div class="message-text">${escapeHtml(msg.message).replace(/\n/g, '<br>')}</div>
                        <div class="message-time">${msg.time}</div>
                    </div>
                </div>
            `).join('');
            
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function showTypingIndicator() {
            const messagesDiv = document.getElementById('messages');
            if (!messagesDiv) return;
            
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing-indicator';
            typingDiv.className = 'typing-indicator';
            typingDiv.innerHTML = '<span></span><span></span><span></span><span style="color:#888; margin-left:5px;">AI is thinking...</span>';
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function removeTypingIndicator() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || !currentUser) return;
            
            addMessage(currentUser.username, message, true, false);
            input.value = '';
            renderMessages();
            
            // Show typing indicator
            showTypingIndicator();
            
            try {
                // Get AI response from Gemini
                const aiResponse = await getAIResponse(message, currentUser.username);
                removeTypingIndicator();
                addMessage("PRRX AI Bot", aiResponse, false, true);
                renderMessages();
            } catch (error) {
                removeTypingIndicator();
                addMessage("PRRX AI Bot", "Sorry, I'm having trouble connecting. Please try again!", false, true);
                renderMessages();
            }
        }
        
        function clearChat() {
            if (confirm("⚠️ Clear all messages? This cannot be undone.")) {
                messages = [];
                addMessage("System", "Chat history cleared by " + currentUser.username, false, false);
                addMessage("PRRX AI Bot", "Chat cleared! I'm ready to help you with any questions about PRRX Panel. Ask me about AIMBOT, ESP, Anti-Cheat, or pricing!", false, true);
                saveMessages();
                renderMessages();
                showToast("💬 Chat cleared");
            }
        }
        
        function searchUsers() {
            searchTerm = document.getElementById('searchInput').value;
            updateOnlineUsers();
        }
        
        function startPrivateChat(username) {
            showToast(`💬 Starting private chat with ${username}... (Coming soon!)`);
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
        
        function leaveChat() {
            if (currentUser) {
                onlineUsers = onlineUsers.filter(u => u.username !== currentUser.username);
                SecureStorage.set('chat_users', onlineUsers);
            }
            currentUser = null;
            showToast("🔒 Left chat");
            showLoginScreen();
        }
        
        function renderChatInterface() {
            document.getElementById('app').innerHTML = `
                <div class="chat-container">
                    <div class="user-sidebar">
                        <h3><i class="fas fa-users"></i> Online Users</h3>
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="Search users..." onkeyup="searchUsers()">
                            <button onclick="searchUsers()"><i class="fas fa-search"></i></button>
                        </div>
                        <div class="user-list" id="userList"></div>
                        <div class="online-count"><i class="fas fa-circle" style="color:#2ecc71; font-size:0.6rem;"></i> <span id="onlineCount">0</span> users online</div>
                    </div>
                    
                    <div class="chat-main">
                        <div class="chat-header">
                            <h3><i class="fas fa-robot"></i> AI-Powered Chat - Gemini AI</h3>
                        </div>
                        <div class="chat-messages" id="messages"></div>
                        <div class="chat-input-area">
                            <input type="text" id="messageInput" placeholder="Ask me anything about PRRX Panel..." onkeypress="if(event.key==='Enter') sendMessage()">
                            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Send</button>
                            <button onclick="leaveChat()" class="leave-btn"><i class="fas fa-sign-out-alt"></i> Leave</button>
                            <button onclick="clearChat()" class="clear-btn"><i class="fas fa-trash"></i> Clear</button>
                        </div>
                    </div>
                </div>
            `;
            
            renderMessages();
            updateOnlineUsers();
        }
        
        function showLoginScreen() {
            document.getElementById('app').innerHTML = `
                <div class="join-screen">
                    <i class="fas fa-robot"></i>
                    <h2>PRRX AI-Powered Live Chat</h2>
                    <p style="color: #888; margin: 1rem 0;">🤖 Powered by Google Gemini AI | Self-Learning</p>
                    <p style="color: #2ecc71; margin: 0.5rem 0;">You need to be logged into your dashboard to join the chat</p>
                    <div>
                        <button onclick="window.location.href='dashboard.html'"><i class="fas fa-sign-in-alt"></i> Login to Dashboard</button>
                        <button onclick="window.location.href='index.html'" style="background:transparent; border:1px solid #2ecc71;">Back to Home</button>
                    </div>
                    <p style="color: #666; font-size: 0.7rem; margin-top: 1.5rem;">HWID: ${CURRENT_HWID.substring(0, 16)}...</p>
                </div>
            `;
        }
        
        // ========== ANTI-DEBUGGING ==========
        setInterval(() => {
            const start = performance.now();
            debugger;
            if (performance.now() - start > 100) {
                document.body.style.opacity = '0.5';
                setTimeout(() => { document.body.style.opacity = '1'; }, 100);
            }
        }, 3000);
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) {
                e.preventDefault();
                showToast("🔒 Security: DevTools blocked");
                return false;
            }
        });
        
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); showToast("🔒 Right-click disabled"); return false; });
        
        // ========== CURSOR ==========
        if (window.innerWidth > 768) {
            const cd = document.querySelector('.cursor-dot');
            const co = document.querySelector('.cursor-outline');
            document.addEventListener('mousemove', (e) => {
                cd.style.transform = `translate(${e.clientX - 4}px, ${e.clientY - 4}px)`;
                co.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
            });
            document.querySelectorAll('a, button, .user-item').forEach(el => {
                el.addEventListener('mouseenter', () => {
                    co.style.width = '50px';
                    co.style.height = '50px';
                    co.style.borderColor = '#2ecc71';
                });
                el.addEventListener('mouseleave', () => {
                    co.style.width = '40px';
                    co.style.height = '40px';
                    co.style.borderColor = 'rgba(46,204,113,0.6)';
                });
            });
        }
        
        // ========== INIT ==========
        loadLearnedResponses();
        
        const loggedInUser = getLoggedInUser();
        if (loggedInUser) {
            currentUser = loggedInUser;
            
            // Add user to online list
            let users = SecureStorage.get('chat_users') || [];
            if (!users.find(u => u.username === currentUser.username)) {
                users.push({ username: currentUser.username, online: true, hwid: currentUser.hwid });
                SecureStorage.set('chat_users', users);
            }
            
            loadMessages();
            
            // Add welcome message if first time
            if (messages.length === 0) {
                addMessage("PRRX AI Bot", `Welcome to PRRX Live Chat, ${currentUser.username}! 👋\n\nI'm your AI assistant powered by Google Gemini. I know everything about PRRX Panel and I can learn from our conversations.\n\n**Try asking me:**\n• "How to use AIMBOT?"\n• "What are the prices?"\n• "How to download PRRX?"\n• "Tell me about Visual Enhancement"`, false, true);
            }
            
            renderChatInterface();
            setInterval(() => updateOnlineUsers(), 5000);
        } else {
            showLoginScreen();
        }
        
        window.sendMessage = sendMessage;
        window.clearChat = clearChat;
        window.searchUsers = searchUsers;
        window.startPrivateChat = startPrivateChat;
        window.leaveChat = leaveChat;
        
        console.log("%c🤖 PRRX AI-POWERED LIVE CHAT ACTIVE", "color: #2ecc71; font-size: 14px");
        console.log("%c🧠 Google Gemini AI Integrated | Self-Learning Enabled | E2E Encrypted", "color: #fff; font-size: 12px");
        console.log("%c🔐 HWID Verified: " + CURRENT_HWID.substring(0, 16), "color: #3498db; font-size: 11px");
    </script>
</body>
</html>
