<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PRRX | HWID Lock Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(46,204,113,0.03) 0%, transparent 50%);
            animation: rotateBg 30s linear infinite;
        }
        .bg-animation::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 8px);
        }
        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* ========== CUSTOM LOADING SCREEN ========== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 10001;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .loading-screen.hidden { opacity: 0; visibility: hidden; }
        .loading-logo {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #2ecc71, #27ae60);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: loadingShimmer 1.5s ease infinite, logoPulse 1.2s ease infinite;
            margin-bottom: 2rem;
        }
        @keyframes loadingShimmer { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes logoPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        .loading-spinner {
            width: 70px;
            height: 70px;
            border: 4px solid rgba(46,204,113,0.15);
            border-top: 4px solid #2ecc71;
            border-right: 4px solid #27ae60;
            border-radius: 50%;
            animation: spin 0.9s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin-bottom: 2rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-progress-container { width: 250px; margin: 1rem 0; }
        .loading-progress { width: 100%; height: 3px; background: rgba(46,204,113,0.2); border-radius: 4px; overflow: hidden; }
        .loading-progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #2ecc71, #27ae60); animation: progressFill 1.4s ease-out forwards; }
        @keyframes progressFill { 0% { width: 0%; } 100% { width: 100%; } }
        .loading-percentage { font-size: 0.8rem; color: #2ecc71; margin-top: 0.5rem; font-weight: 600; }
        .loading-text { font-size: 0.85rem; color: #888; letter-spacing: 2px; margin-top: 1rem; }
        .loading-dots span { display: inline-block; animation: dotBlink 1.4s infinite; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBlink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
        .loading-particles { position: absolute; width: 100%; height: 100%; overflow: hidden; pointer-events: none; }
        .loading-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: radial-gradient(circle, #2ecc71, #27ae60);
            border-radius: 50%;
            opacity: 0;
            animation: floatParticle 2.5s ease-out forwards;
        }
        @keyframes floatParticle {
            0% { opacity: 0; transform: translateY(0) scale(0); }
            15% { opacity: 0.8; transform: translateY(-20px) scale(1); }
            100% { opacity: 0; transform: translateY(-120px) scale(0); }
        }
        .loading-security { margin-top: 2rem; font-size: 0.7rem; color: #2ecc71; display: flex; align-items: center; gap: 0.5rem; background: rgba(0,0,0,0.3); padding: 0.4rem 1rem; border-radius: 30px; }
        .loading-security i { animation: securityPulse 1s ease infinite; }
        @keyframes securityPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; text-shadow: 0 0 5px #2ecc71; } }
        
        /* Anti-DevTools */
        .anti-devtools {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 20000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(20px);
        }
        .anti-devtools.active { display: flex; }
        .anti-devtools i { font-size: 4rem; color: #ff5050; margin-bottom: 1rem; animation: shake 0.5s ease infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .anti-devtools p { color: #ff5050; font-size: 1.2rem; text-align: center; padding: 1rem; }
        
        /* Custom Cursor */
        @media (min-width: 768px) {
            .cursor-dot { width: 8px; height: 8px; background-color: #2ecc71; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transition: transform 0.1s ease; box-shadow: 0 0 12px #2ecc71; }
            .cursor-outline { width: 32px; height: 32px; border: 2px solid rgba(46,204,113,0.6); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transition: transform 0.2s ease, width 0.2s, height 0.2s; backdrop-filter: blur(2px); }
        }
        @media (max-width: 768px) { .cursor-dot, .cursor-outline { display: none; } }
        
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; display: block; pointer-events: none; }
        .content { position: relative; z-index: 2; max-width: 500px; margin: 0 auto; padding: 6rem 1.5rem 2rem; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        
        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 1px solid rgba(46,204,113,0.3);
            animation: slideDown 0.5s ease;
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .logo { 
            font-size: 1.5rem; 
            font-weight: 800; 
            background: linear-gradient(135deg, #fff, #2ecc71); 
            -webkit-background-clip: text; 
            background-clip: text; 
            color: transparent; 
            text-decoration: none;
        }
        .menu { display: flex; gap: 2rem; }
        .menu a { 
            color: #fff; 
            text-decoration: none; 
            font-weight: 500; 
            font-size: 0.9rem; 
            transition: all 0.3s;
            position: relative;
        }
        .menu a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0%;
            height: 2px;
            background: #2ecc71;
            transition: width 0.3s;
        }
        .menu a:hover::after { width: 100%; }
        .menu a:hover { color: #2ecc71; }
        
        /* Auth Card */
        .auth-card {
            background: rgba(20,20,20,0.8);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 2rem;
            text-align: center;
            border: 1px solid rgba(46,204,113,0.3);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hwid-box {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 0.8rem;
            margin: 1rem 0;
            font-size: 0.7rem;
            font-family: monospace;
            word-break: break-all;
            border: 1px solid rgba(46,204,113,0.2);
        }
        .hwid-box i { color: #2ecc71; margin-right: 0.5rem; }
        .input-group {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(46,204,113,0.3);
            border-radius: 50px;
            padding: 0.8rem 1rem;
            margin: 1rem 0;
            transition: all 0.3s;
        }
        .input-group:focus-within {
            border-color: #2ecc71;
            box-shadow: 0 0 15px rgba(46,204,113,0.3);
        }
        .input-group i { color: #2ecc71; margin-right: 0.8rem; width: 20px; }
        .input-group input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            outline: none;
            font-size: 0.9rem;
        }
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(46,204,113,0.2);
            padding-bottom: 1rem;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #888;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.5rem 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 30px;
            flex: 1;
        }
        .tab-btn.active {
            background: rgba(46,204,113,0.15);
            color: #2ecc71;
            border: 1px solid #2ecc71;
        }
        .submit-btn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            padding: 0.8rem;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }
        .submit-btn:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(46,204,113,0.4); }
        
        /* Dashboard Card */
        .dashboard-card {
            background: rgba(20,20,20,0.8);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 2rem;
            border: 1px solid rgba(46,204,113,0.3);
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }
        .user-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
            font-weight: bold;
            animation: pulseGlow 2s ease infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(46,204,113,0.4); }
            50% { box-shadow: 0 0 0 10px rgba(46,204,113,0); }
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1.5rem 0;
            padding: 1rem;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
        }
        .info-item .label { font-size: 0.7rem; color: #888; }
        .info-item .value { font-size: 1rem; font-weight: 600; color: #2ecc71; }
        .hwid-locked {
            background: rgba(46,204,113,0.1);
            border-radius: 16px;
            padding: 0.8rem;
            margin: 1rem 0;
            font-size: 0.7rem;
            font-family: monospace;
        }
        .logout-btn {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255,80,80,0.15);
            border: 1px solid #ff5050;
            border-radius: 40px;
            color: #ff5050;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }
        .logout-btn:hover { background: #ff5050; color: #fff; }
        
        /* Live Chat Button */
        .chat-btn {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .chat-btn:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(46,204,113,0.4); }
        .chat-btn i { animation: bounce 1s ease infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(3px); }
        }
        
        .toast-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2ecc71;
            color: #0a0a0a;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            z-index: 10000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .toast-notification.show { transform: translateX(0); }
        
        @media (max-width: 768px) { 
            .navbar { padding: 0.8rem 1rem; } 
            .menu { gap: 1rem; } 
            .content { padding: 5rem 1rem 2rem; }
        }
    </style>
</head>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        const canvas = document.getElementById('bg-canvas');
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x0a0a0a);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000); camera.position.set(0, 0, 5);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const geometry = new THREE.TorusKnotGeometry(1.1, 0.28, 160, 24, 3, 4);
        const material = new THREE.MeshStandardMaterial({ color: 0x2ecc71, emissive: 0x1a4c3a, emissiveIntensity: 0.3, metalness: 0.8, roughness: 0.3 });
        const torusKnot = new THREE.Mesh(geometry, material); scene.add(torusKnot);
        const particlesGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(1200 * 3);
        for (let i = 0; i < 1200; i++) {
            const radius = 2.5 + Math.random() * 2.5;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            positions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
            positions[i*3+2] = radius * Math.cos(phi);
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleSystem = new THREE.Points(particlesGeometry, new THREE.PointsMaterial({ color: 0x2ecc71, size: 0.04 }));
        scene.add(particleSystem);
        const ringGeo = new THREE.TorusGeometry(1.6, 0.04, 48, 400);
        const ring = new THREE.Mesh(ringGeo, new THREE.MeshStandardMaterial({ color: 0x2ecc71, emissive: 0x2ecc71, emissiveIntensity: 0.3 }));
        scene.add(ring);
        const ambientLight = new THREE.AmbientLight(0x111111); scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x2ecc71, 0.8); pointLight.position.set(2, 3, 4); scene.add(pointLight);
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for (let i = 0; i < 600; i++) { starPos.push((Math.random() - 0.5) * 150); starPos.push((Math.random() - 0.5) * 80); starPos.push((Math.random() - 0.5) * 40 - 15); }
        starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.06 }));
        scene.add(stars);
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            torusKnot.rotation.x += 0.008; torusKnot.rotation.y += 0.012;
            ring.rotation.x = Math.sin(time * 0.5) * 0.3; ring.rotation.y += 0.01;
            particleSystem.rotation.y += 0.0005;
            stars.rotation.y += 0.0002;
            camera.lookAt(0, 0, 0);
            renderer.render(scene, camera);
            time += 0.008;
        }
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
    <script>
        // ========== LOADING SCREEN ==========
        let loadingProgress = 0;
        const percentageElement = document.getElementById('loadingPercentage');
        function updateLoadingProgress() {
            const interval = setInterval(() => {
                loadingProgress += Math.random() * 12;
                if (loadingProgress >= 100) { loadingProgress = 100; clearInterval(interval); }
                if (percentageElement) percentageElement.textContent = Math.floor(loadingProgress) + '%';
            }, 120);
        }
        
        function createLoadingParticles() {
            const container = document.getElementById('loadingParticles');
            if (!container) return;
            for (let i = 0; i < 80; i++) {
                const particle = document.createElement('div');
                particle.className = 'loading-particle';
                particle.style.left = Math.random() * window.innerWidth + 'px';
                particle.style.top = window.innerHeight + Math.random() * 150 + 'px';
                particle.style.setProperty('--x', (Math.random() - 0.5) * 150 + 'px');
                particle.style.animationDelay = Math.random() * 2 + 's';
                particle.style.animationDuration = 1.5 + Math.random() * 1.5 + 's';
                container.appendChild(particle);
            }
        }
        
        updateLoadingProgress();
        createLoadingParticles();
        
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loadingScreen = document.getElementById('loadingScreen');
                loadingScreen.classList.add('hidden');
                setTimeout(() => { if (loadingScreen) loadingScreen.style.display = 'none'; }, 600);
            }, 1400);
        });
        
        // ========== ENCRYPTION ==========
        const ENCRYPTION_KEY = 'PRRX_HWID_KEY_2026_SECURE';
        
        function encryptData(data) {
            let encrypted = '';
            for (let i = 0; i < data.length; i++) {
                const keyChar = ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length);
                const dataChar = data.charCodeAt(i);
                encrypted += String.fromCharCode(dataChar ^ keyChar);
            }
            return btoa(encrypted);
        }
        
        function decryptData(encryptedData) {
            try {
                const decoded = atob(encryptedData);
                let decrypted = '';
                for (let i = 0; i < decoded.length; i++) {
                    const keyChar = ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length);
                    const dataChar = decoded.charCodeAt(i);
                    decrypted += String.fromCharCode(dataChar ^ keyChar);
                }
                return decrypted;
            } catch(e) { return null; }
        }
        
        const SecureStorage = {
            set: (key, value) => { localStorage.setItem(`secure_${key}`, encryptData(JSON.stringify(value))); },
            get: (key) => {
                const encrypted = localStorage.getItem(`secure_${key}`);
                if (!encrypted) return null;
                try { return JSON.parse(decryptData(encrypted)); } catch(e) { return null; }
            },
            remove: (key) => localStorage.removeItem(`secure_${key}`)
        };
        
        // ========== HWID GENERATION ==========
        function generateHWID() {
            const components = [
                navigator.userAgent,
                navigator.language,
                screen.width + 'x' + screen.height,
                screen.colorDepth,
                new Date().getTimezoneOffset(),
                navigator.hardwareConcurrency || 4,
                navigator.deviceMemory || 4,
                navigator.platform,
                navigator.maxTouchPoints || 0,
                window.screen.pixelDepth
            ];
            let hash = 0;
            const str = components.join('|');
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash).toString(16).toUpperCase();
        }
        
        const CURRENT_HWID = generateHWID();
        
        // ========== USER DATABASE ==========
        function initDatabase() {
            let users = SecureStorage.get('users');
            if (!users) {
                users = {};
                SecureStorage.set('users', users);
            }
            return users;
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
        
        // ========== REGISTER ==========
        function register(username, password) {
            if (!username || !password) {
                showToast("❌ Please enter username and password");
                return false;
            }
            if (username.length < 3) {
                showToast("❌ Username must be at least 3 characters");
                return false;
            }
            if (password.length < 4) {
                showToast("❌ Password must be at least 4 characters");
                return false;
            }
            
            const users = SecureStorage.get('users');
            if (users[username]) {
                showToast("❌ Username already exists");
                return false;
            }
            
            users[username] = {
                password: password,
                hwid: CURRENT_HWID,
                registeredAt: new Date().toISOString(),
                lastLogin: null
            };
            SecureStorage.set('users', users);
            
            showToast(`✅ Registration successful! HWID locked to this device.`);
            showLoginForm();
            return true;
        }
        
        // ========== LOGIN ==========
        function login(username, password) {
            const users = SecureStorage.get('users');
            
            if (!users[username]) {
                showToast("❌ Username not found");
                return false;
            }
            
            if (users[username].password !== password) {
                showToast("❌ Incorrect password");
                return false;
            }
            
            if (users[username].hwid !== CURRENT_HWID) {
                showToast("❌ HWID MISMATCH! This account is locked to another device.");
                showToast("🔒 Contact support to reset HWID");
                return false;
            }
            
            users[username].lastLogin = new Date().toISOString();
            SecureStorage.set('users', users);
            
            const session = {
                username: username,
                hwid: CURRENT_HWID,
                loginTime: new Date().toISOString()
            };
            SecureStorage.set('session', session);
            
            // Store for chat access
            localStorage.setItem('prrx_dashboard_session', JSON.stringify(session));
            
            showToast(`✅ Welcome back, ${username}! HWID verified.`);
            renderDashboard(username);
            return true;
        }
        
        // ========== LOGOUT ==========
        function logout() {
            SecureStorage.remove('session');
            localStorage.removeItem('prrx_dashboard_session');
            showToast("🔒 Logged out successfully");
            showLoginForm();
        }
        
        // ========== CHECK SESSION ==========
        function checkSession() {
            const session = SecureStorage.get('session');
            if (session && session.hwid === CURRENT_HWID) {
                renderDashboard(session.username);
                return true;
            }
            return false;
        }
        
        // ========== OPEN LIVE CHAT ==========
        function openLiveChat() {
            const session = SecureStorage.get('session');
            if (session) {
                localStorage.setItem('prrx_dashboard_session', JSON.stringify(session));
            }
            showToast("💬 Opening Live Chat...");
            setTimeout(() => {
                window.location.href = 'live-chat.html';
            }, 300);
        }
        
        // ========== UI RENDERING ==========
        function showLoginForm() {
            document.getElementById('appContainer').innerHTML = `
                <div class="auth-card">
                    <div class="tabs">
                        <button class="tab-btn active" onclick="showLoginForm()">🔐 Login</button>
                        <button class="tab-btn" onclick="showRegisterForm()">📝 Register</button>
                    </div>
                    
                    <div class="hwid-box">
                        <i class="fas fa-microchip"></i> Device HWID: <span style="color:#2ecc71;">${CURRENT_HWID.substring(0, 16)}...</span>
                    </div>
                    
                    <form id="loginForm" onsubmit="event.preventDefault(); loginSubmit()">
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" id="loginUsername" placeholder="Username" required autocomplete="off">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="loginPassword" placeholder="Password" required autocomplete="off">
                        </div>
                        <button type="submit" class="submit-btn"><i class="fas fa-sign-in-alt"></i> Login</button>
                    </form>
                    
                    <button class="chat-btn" id="gotoChatBtn"><i class="fas fa-comments"></i> Join Live Chat</button>
                    
                    <div style="margin-top: 1rem; text-align: center; font-size: 0.7rem; color: #888;">
                        <i class="fas fa-fingerprint"></i> HWID Locked Account | Device verification required
                    </div>
                </div>
            `;
            
            document.getElementById('gotoChatBtn').addEventListener('click', openLiveChat);
        }
        
        function loginSubmit() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            login(username, password);
        }
        
        function showRegisterForm() {
            document.getElementById('appContainer').innerHTML = `
                <div class="auth-card">
                    <div class="tabs">
                        <button class="tab-btn" onclick="showLoginForm()">🔐 Login</button>
                        <button class="tab-btn active" onclick="showRegisterForm()">📝 Register</button>
                    </div>
                    
                    <div class="hwid-box">
                        <i class="fas fa-microchip"></i> Device HWID: <span style="color:#2ecc71;">${CURRENT_HWID.substring(0, 16)}...</span>
                        <br><small style="color:#2ecc71;">This HWID will be locked to your account</small>
                    </div>
                    
                    <form id="registerForm" onsubmit="event.preventDefault(); registerSubmit()">
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" id="regUsername" placeholder="Username (min 3 chars)" required autocomplete="off">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="regPassword" placeholder="Password (min 4 chars)" required autocomplete="off">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-check-circle"></i>
                            <input type="password" id="regConfirmPassword" placeholder="Confirm Password" required autocomplete="off">
                        </div>
                        <button type="submit" class="submit-btn"><i class="fas fa-user-plus"></i> Register & Lock HWID</button>
                    </form>
                    
                    <button class="chat-btn" id="gotoChatBtnReg"><i class="fas fa-comments"></i> Join Live Chat</button>
                    
                    <div style="margin-top: 1rem; text-align: center; font-size: 0.7rem; color: #ffaa00;">
                        <i class="fas fa-exclamation-triangle"></i> This account will be locked to this device
                    </div>
                </div>
            `;
            
            document.getElementById('gotoChatBtnReg').addEventListener('click', openLiveChat);
        }
        
        function registerSubmit() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            
            if (password !== confirm) {
                showToast("❌ Passwords do not match");
                return;
            }
            register(username, password);
        }
        
        function renderDashboard(username) {
            const users = SecureStorage.get('users');
            const userData = users[username];
            const registeredDate = new Date(userData.registeredAt).toLocaleDateString();
            const lastLogin = userData.lastLogin ? new Date(userData.lastLogin).toLocaleString() : 'First login';
            
            document.getElementById('appContainer').innerHTML = `
                <div class="dashboard-card">
                    <div class="user-avatar">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <h2>${username}</h2>
                    <p><i class="fas fa-check-circle" style="color:#2ecc71;"></i> HWID Verified</p>
                    
                    <div class="info-grid">
                        <div class="info-item"><div class="label">Account Created</div><div class="value">${registeredDate}</div></div>
                        <div class="info-item"><div class="label">Last Login</div><div class="value">${lastLogin}</div></div>
                        <div class="info-item"><div class="label">HWID Status</div><div class="value" style="color:#2ecc71;">Locked ✓</div></div>
                        <div class="info-item"><div class="label">Security</div><div class="value">E2E Encrypted</div></div>
                    </div>
                    
                    <div class="hwid-locked">
                        <i class="fas fa-fingerprint"></i> Device HWID: ${CURRENT_HWID.substring(0, 20)}...
                        <br><small>This account is locked to this device</small>
                    </div>
                    
                    <div style="background: rgba(46,204,113,0.1); border-radius: 16px; padding: 0.8rem; margin: 1rem 0;">
                        <i class="fas fa-gem"></i> PRRX Premium Access
                        <div style="font-size: 0.7rem; color:#888;">HWID Lock Active | Secure Session</div>
                    </div>
                    
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    <button class="chat-btn" id="dashboardChatBtn"><i class="fas fa-comments"></i> Open Live Chat</button>
                </div>
            `;
            
            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('dashboardChatBtn').addEventListener('click', openLiveChat);
        }
        
        // ========== ANTI-DEBUGGING ==========
        let devToolsOpen = false;
        setInterval(() => {
            const start = performance.now();
            debugger;
            const end = performance.now();
            if (end - start > 100 && !devToolsOpen) {
                devToolsOpen = true;
                document.getElementById('antiDevTools').classList.add('active');
            }
        }, 2000);
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) {
                e.preventDefault();
                showToast("🔒 Security: This action is disabled");
                return false;
            }
        });
        
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); showToast("🔒 Right-click disabled"); return false; });
        document.addEventListener('selectstart', (e) => e.preventDefault());
        if (window.self !== window.top) { window.top.location = window.self.location; }
        
        // Custom Cursor
        if (window.innerWidth > 768) {
            const cd = document.querySelector('.cursor-dot'), co = document.querySelector('.cursor-outline');
            if (cd && co) {
                document.addEventListener('mousemove', (e) => {
                    cd.style.transform = `translate(${e.clientX - 4}px, ${e.clientY - 4}px)`;
                    co.style.transform = `translate(${e.clientX - 16}px, ${e.clientY - 16}px)`;
                });
                document.querySelectorAll('a, button, .auth-card, .dashboard-card').forEach(el => {
                    el.addEventListener('mouseenter', () => { co.style.width = '48px'; co.style.height = '48px'; co.style.borderColor = '#2ecc71'; });
                    el.addEventListener('mouseleave', () => { co.style.width = '32px'; co.style.height = '32px'; co.style.borderColor = 'rgba(46,204,113,0.6)'; });
                });
            }
        }
        
        // Make functions global
        window.showLoginForm = showLoginForm;
        window.showRegisterForm = showRegisterForm;
        window.loginSubmit = loginSubmit;
        window.registerSubmit = registerSubmit;
        
        // Initialize
        initDatabase();
        if (!checkSession()) { showLoginForm(); }
        
        console.log("%c🔒 PRRX HWID LOCK SYSTEM ACTIVE", "color: #2ecc71; font-size: 14px;");
        console.log(`%cDevice HWID: ${CURRENT_HWID}`, "color: #27ae60; font-size: 12px;");
        console.log("%c💬 Live Chat Integrated - Click button to join!", "color: #2ecc71; font-size: 11px;");
    </script>
</body>
</html>
