<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PRRX | Live Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(46,204,113,0.05) 0%, transparent 50%);
            animation: rotateBg 20s linear infinite;
        }
        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.05s ease;
            box-shadow: 0 0 10px #2ecc71;
        }
        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(46,204,113,0.6);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transition: transform 0.15s ease, width 0.2s, height 0.2s;
            backdrop-filter: blur(2px);
        }
        @media (max-width: 768px) { .cursor-dot, .cursor-outline { display: none; } }
        
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 1px solid rgba(46,204,113,0.3);
        }
        .logo { 
            font-size: 1.5rem; 
            font-weight: 800; 
            background: linear-gradient(135deg, #fff, #2ecc71); 
            -webkit-background-clip: text; 
            background-clip: text; 
            color: transparent; 
            text-decoration: none;
        }
        .menu { display: flex; gap: 2rem; }
        .menu a { 
            color: #fff; 
            text-decoration: none; 
            font-weight: 500; 
            transition: all 0.3s;
            position: relative;
        }
        .menu a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0%;
            height: 2px;
            background: #2ecc71;
            transition: width 0.3s;
        }
        .menu a:hover::after { width: 100%; }
        .menu a:hover { color: #2ecc71; }
        
        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 6rem 1.5rem 2rem;
            min-height: 100vh;
        }
        
        .join-screen {
            text-align: center;
            padding: 2.5rem;
            background: rgba(20,20,20,0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            max-width: 450px;
            margin: 0 auto;
        }
        .join-screen i {
            font-size: 4rem;
            color: #2ecc71;
            margin-bottom: 1rem;
        }
        .join-screen input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(46,204,113,0.3);
            border-radius: 50px;
            color: white;
            margin: 1rem 0;
            outline: none;
            text-align: center;
            font-size: 1rem;
        }
        .join-screen input:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 10px rgba(46,204,113,0.3);
        }
        .join-screen button {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }
        .join-screen button:hover {
            transform: scale(1.02);
        }
        
        .chat-container {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            background: rgba(20,20,20,0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 1.5rem;
            border: 1px solid rgba(46,204,113,0.3);
            min-height: 70vh;
        }
        
        .user-sidebar {
            width: 280px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 1rem;
        }
        .user-sidebar h3 {
            font-size: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(46,204,113,0.3);
        }
        .user-sidebar h3 i { color: #2ecc71; margin-right: 0.5rem; }
        
        .online-users {
            max-height: 400px;
            overflow-y: auto;
        }
        .user-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.6rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 0.3rem;
        }
        .user-item:hover { background: rgba(46,204,113,0.15); }
        .user-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .user-name { font-size: 0.85rem; flex: 1; }
        .online-dot {
            width: 8px;
            height: 8px;
            background: #2ecc71;
            border-radius: 50%;
        }
        
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            overflow: hidden;
        }
        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(46,204,113,0.2);
            background: rgba(0,0,0,0.3);
        }
        .chat-header h3 { font-size: 1rem; }
        .chat-header h3 i { color: #2ecc71; margin-right: 0.5rem; }
        .user-badge {
            font-size: 0.8rem;
            color: #2ecc71;
            background: rgba(46,204,113,0.15);
            padding: 0.3rem 1rem;
            border-radius: 20px;
        }
        
        .chat-messages {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            max-height: 500px;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        
        .message {
            display: flex;
            gap: 0.8rem;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        .message-content {
            flex: 1;
            background: rgba(255,255,255,0.05);
            padding: 0.6rem 1rem;
            border-radius: 18px;
            max-width: 70%;
        }
        .message-own { justify-content: flex-end; }
        .message-own .message-content {
            background: rgba(46,204,113,0.15);
            border: 1px solid rgba(46,204,113,0.3);
        }
        .message-sender {
            font-size: 0.7rem;
            color: #2ecc71;
            margin-bottom: 0.2rem;
        }
        .message-text { font-size: 0.85rem; word-wrap: break-word; }
        .message-time {
            font-size: 0.55rem;
            color: #666;
            margin-top: 0.2rem;
            text-align: right;
        }
        .bot-message .message-avatar {
            background: linear-gradient(135deg, #f39c12, #e67e22);
        }
        .bot-message .message-sender { color: #f39c12; }
        
        .chat-input-area {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            border-top: 1px solid rgba(46,204,113,0.2);
        }
        .chat-input-area input {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(46,204,113,0.3);
            border-radius: 30px;
            padding: 0.8rem 1rem;
            color: white;
            outline: none;
        }
        .chat-input-area input:focus { border-color: #2ecc71; }
        .chat-input-area button {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            border-radius: 30px;
            padding: 0.8rem 1.2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .chat-input-area button:hover { transform: scale(1.02); }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2ecc71;
            color: #0a0a0a;
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 10000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }
        .toast.show { transform: translateX(0); }
        
        @media (max-width: 768px) {
            .navbar { padding: 0.8rem 1rem; }
            .menu { gap: 1rem; }
            .user-sidebar { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="bg-animation"></div>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <div class="navbar">
        <a href="index.html" class="logo">PRRX</a>
        <div class="menu">
            <a href="index.html">HOME</a>
            <a href="features.html">FEATURES</a>
            <a href="live-chat.html">CHAT</a>
            <a href="dashboard.html">DASHBOARD</a>
        </div>
    </div>

    <div class="container" id="app"></div>
    <div id="toast" class="toast"></div>

    <script>
        // ========== CHAT DATA ==========
        let currentUser = null;
        let messages = [];
        let onlineUsers = [];
        
        // Bot responses
        const COMMANDS = `📋 **Available Commands:**
• !help - Show this menu
• !aimbot - AIMBOT guide
• !esp - Visual Enhancement guide
• !price - Pricing information
• !download - Download link
• !tip - Random tip`;
        
        function getBotResponse(msg) {
            const m = msg.toLowerCase();
            if (m.includes('hi') || m.includes('hello') || m.includes('hey')) {
                return "Hello! 👋 Need help? Type `!help` for commands!";
            }
            if (m.includes('!help') || m.includes('help')) {
                return COMMANDS;
            }
            if (m.includes('!aimbot') || m.includes('aimbot')) {
                return "🎯 **AIMBOT:** Go to Settings Menu > AIM ASSISTANCE. Toggle AIMBOT +++ for max accuracy!";
            }
            if (m.includes('!esp') || m.includes('esp')) {
                return "👁️ **Visual Enhancement:** Use CHAMS MENU for player highlighting and ESP for location tracking!";
            }
            if (m.includes('!price') || m.includes('price')) {
                return "💰 **PRRX Plans:** 1 Week - 300 LKR | 1 Month - 850 LKR | 1 Year - 2299 LKR";
            }
            if (m.includes('!download') || m.includes('download')) {
                return "📥 **Download:** https://github.com/sayuzprx/prrxwebsite/releases/download/v3.2/PRRX.HEX.1.rar";
            }
            if (m.includes('!tip') || m.includes('tip')) {
                return "💡 **Tip:** Use Key Bind to quickly toggle features in-game! Press F2 for AIMBOT!";
            }
            return null;
        }
        
        // Load/Save messages
        function loadMessages() {
            const saved = localStorage.getItem('prrx_chat');
            if (saved) {
                messages = JSON.parse(saved);
            } else {
                messages = [];
            }
            return messages;
        }
        
        function saveMessages() {
            localStorage.setItem('prrx_chat', JSON.stringify(messages));
        }
        
        function addMessage(sender, message, isOwn = false, isBot = false) {
            const newMsg = {
                id: Date.now(),
                sender: sender,
                message: message,
                time: new Date().toLocaleTimeString(),
                isOwn: isOwn,
                isBot: isBot
            };
            messages.push(newMsg);
            if (messages.length > 100) messages.shift();
            saveMessages();
            return newMsg;
        }
        
        // Render functions
        function renderMessages() {
            const container = document.getElementById('messages');
            if (!container) return;
            
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.isOwn ? 'message-own' : ''} ${msg.isBot ? 'bot-message' : ''}">
                    <div class="message-avatar">${msg.isBot ? '<i class="fas fa-robot"></i>' : msg.sender.charAt(0).toUpperCase()}</div>
                    <div class="message-content">
                        <div class="message-sender">${msg.sender} ${msg.isBot ? '(Bot)' : ''}</div>
                        <div class="message-text">${escapeHtml(msg.message).replace(/\n/g, '<br>')}</div>
                        <div class="message-time">${msg.time}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        function renderOnlineUsers() {
            const container = document.getElementById('onlineUsersList');
            if (!container) return;
            container.innerHTML = onlineUsers.map(user => `
                <div class="user-item" onclick="showToast('Private chat coming soon!')">
                    <div class="user-avatar">${user.username.charAt(0).toUpperCase()}</div>
                    <div class="user-name">${user.username}</div>
                    <div class="online-dot"></div>
                </div>
            `).join('');
            document.getElementById('onlineCount').textContent = onlineUsers.length;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || !currentUser) return;
            
            addMessage(currentUser.username, message, true, false);
            input.value = '';
            renderMessages();
            
            setTimeout(() => {
                const botResponse = getBotResponse(message);
                if (botResponse) {
                    addMessage("PRRX Bot", botResponse, false, true);
                    renderMessages();
                }
            }, 500);
        }
        
        function leaveChat() {
            currentUser = null;
            showJoinScreen();
        }
        
        function renderChatInterface() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="chat-container">
                    <div class="user-sidebar">
                        <h3><i class="fas fa-users"></i> Online Users (<span id="onlineCount">0</span>)</h3>
                        <div class="online-users" id="onlineUsersList"></div>
                    </div>
                    
                    <div class="chat-main">
                        <div class="chat-header">
                            <h3><i class="fas fa-comments"></i> Public Chat</h3>
                            <div class="user-badge"><i class="fas fa-user"></i> ${currentUser.username}</div>
                        </div>
                        <div class="chat-messages" id="messages"></div>
                        <div class="chat-input-area">
                            <input type="text" id="messageInput" placeholder="Type a message... Type !help for commands" onkeypress="if(event.key==='Enter') sendMessage()">
                            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Send</button>
                            <button onclick="leaveChat()" style="background:rgba(255,80,80,0.2); border:1px solid #ff5050; color:#ff5050;"><i class="fas fa-sign-out-alt"></i> Leave</button>
                        </div>
                    </div>
                </div>
            `;
            
            renderMessages();
            renderOnlineUsers();
        }
        
        function showJoinScreen() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="join-screen">
                    <i class="fas fa-comments"></i>
                    <h2>PRRX Live Chat</h2>
                    <p style="color: #888; margin-bottom: 1rem;">🤖 Bot Assistant | Type !help for commands</p>
                    <input type="text" id="usernameInput" placeholder="Enter your username" maxlength="20">
                    <button id="joinBtn">Join Chat</button>
                </div>
            `;
            
            // Direct event listener
            const joinBtn = document.getElementById('joinBtn');
            const usernameInput = document.getElementById('usernameInput');
            
            if (joinBtn) {
                joinBtn.onclick = function() {
                    const username = usernameInput.value.trim();
                    if (!username) {
                        showToast("Please enter a username");
                        return;
                    }
                    if (username.length < 2) {
                        showToast("Username must be at least 2 characters");
                        return;
                    }
                    
                    currentUser = { username: username };
                    
                    if (!onlineUsers.find(u => u.username === username)) {
                        onlineUsers.push({ username: username });
                    }
                    
                    if (messages.length === 0) {
                        addMessage("PRRX Bot", `🎉 Welcome ${username}! 🎉\n\n${COMMANDS}`, false, true);
                    } else {
                        addMessage("PRRX Bot", `${username} joined the chat! Welcome! 🎮`, false, true);
                    }
                    
                    renderChatInterface();
                };
            }
            
            if (usernameInput) {
                usernameInput.onkeypress = function(e) {
                    if (e.key === 'Enter') {
                        const btn = document.getElementById('joinBtn');
                        if (btn) btn.click();
                    }
                };
            }
        }
        
        // ========== SECURITY ==========
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) {
                e.preventDefault();
                showToast("🔒 DevTools blocked");
                return false;
            }
        });
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); showToast("🔒 Right-click disabled"); return false; });
        
        // Cursor
        if (window.innerWidth > 768) {
            const cd = document.querySelector('.cursor-dot');
            const co = document.querySelector('.cursor-outline');
            document.addEventListener('mousemove', (e) => {
                cd.style.transform = `translate(${e.clientX - 4}px, ${e.clientY - 4}px)`;
                co.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
            });
        }
        
        // ========== INIT ==========
        loadMessages();
        showJoinScreen();
        
        window.sendMessage = sendMessage;
        window.leaveChat = leaveChat;
        
        console.log("%c💬 PRRX LIVE CHAT ACTIVE", "color: #2ecc71; font-size: 14px");
    </script>
</body>
</html>
