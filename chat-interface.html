<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PRRX | AI Secure Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(46,204,113,0.05) 0%, transparent 50%);
            animation: rotateBg 20s linear infinite;
        }
        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.05s ease;
            box-shadow: 0 0 10px #2ecc71;
        }
        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(46,204,113,0.6);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transition: transform 0.15s ease, width 0.2s, height 0.2s;
            backdrop-filter: blur(2px);
        }
        @media (max-width: 768px) { .cursor-dot, .cursor-outline { display: none; } }
        
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 1px solid rgba(46,204,113,0.3);
        }
        .logo { 
            font-size: 1.5rem; 
            font-weight: 800; 
            background: linear-gradient(135deg, #fff, #2ecc71); 
            -webkit-background-clip: text; 
            background-clip: text; 
            color: transparent; 
            text-decoration: none;
        }
        .menu { display: flex; gap: 2rem; }
        .menu a { 
            color: #fff; 
            text-decoration: none; 
            font-weight: 500; 
            transition: all 0.3s;
            position: relative;
        }
        .menu a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0%;
            height: 2px;
            background: #2ecc71;
            transition: width 0.3s;
        }
        .menu a:hover::after { width: 100%; }
        .menu a:hover { color: #2ecc71; }
        
        .container {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 6rem 1.5rem 2rem;
            min-height: 100vh;
        }
        
        .chat-container {
            background: rgba(20,20,20,0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(46,204,113,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 70vh;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
        }
        
        .chat-header {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid rgba(46,204,113,0.2);
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .chat-header h3 {
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .chat-header h3 i { color: #2ecc71; }
        .chat-header .user-info {
            font-size: 0.8rem;
            color: #2ecc71;
            background: rgba(46,204,113,0.15);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            border: 1px solid rgba(46,204,113,0.3);
        }
        
        .chat-messages {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .message {
            display: flex;
            gap: 0.8rem;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        .message-content {
            flex: 1;
            background: rgba(255,255,255,0.05);
            padding: 0.7rem 1rem;
            border-radius: 18px;
            max-width: 70%;
        }
        .message-own { justify-content: flex-end; }
        .message-own .message-content {
            background: rgba(46,204,113,0.15);
            border: 1px solid rgba(46,204,113,0.3);
        }
        .message-sender {
            font-size: 0.7rem;
            color: #2ecc71;
            margin-bottom: 0.2rem;
        }
        .message-text { font-size: 0.85rem; word-wrap: break-word; line-height: 1.4; }
        .message-time {
            font-size: 0.55rem;
            color: #666;
            margin-top: 0.2rem;
            text-align: right;
        }
        .bot-message .message-avatar {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }
        .bot-message .message-sender { color: #3498db; }
        
        .typing-indicator {
            display: flex;
            gap: 0.3rem;
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            width: fit-content;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #2ecc71;
            border-radius: 50%;
            animation: typing 1s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }
        
        .chat-input-area {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            border-top: 1px solid rgba(46,204,113,0.2);
            background: rgba(0,0,0,0.4);
        }
        .chat-input-area input {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(46,204,113,0.3);
            border-radius: 30px;
            padding: 0.8rem 1rem;
            color: white;
            outline: none;
        }
        .chat-input-area input:focus { border-color: #2ecc71; }
        .chat-input-area button {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            border-radius: 30px;
            padding: 0.8rem 1.2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .chat-input-area button:hover { transform: scale(1.02); }
        .leave-btn { background: rgba(255,80,80,0.2) !important; border: 1px solid #ff5050 !important; color: #ff5050 !important; }
        .clear-btn { background: rgba(255,165,0,0.2) !important; border: 1px solid #ffa500 !important; color: #ffa500 !important; }
        
        .security-footer {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
            font-size: 0.6rem;
            color: #2ecc71;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2ecc71;
            color: #0a0a0a;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            z-index: 10000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }
        .toast.show { transform: translateX(0); }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(46,204,113,0.2);
            border-top: 3px solid #2ecc71;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #2ecc71; border-radius: 10px; }
        
        @media (max-width: 768px) {
            .navbar { padding: 0.8rem 1rem; }
            .menu { gap: 1rem; }
            .chat-header { flex-direction: column; gap: 0.5rem; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="bg-animation"></div>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <div class="navbar">
        <a href="index.html" class="logo">PRRX</a>
        <div class="menu">
            <a href="index.html">HOME</a>

    <div class="container" id="app"></div>
    <div id="toast" class="toast"></div>

    <script>
        // ========== GOOGLE GEMINI AI ==========
        const GEMINI_API_KEY = "AIzaSyB3YDwE7KKnOVB43rtpePFZLBpljv0ld-k";
        const GEMINI_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent";
        
        const PRRX_KNOWLEDGE = `
You are PRRX Bot, the official AI assistant for PRRX Gaming Panel.

PRRX PANEL INFORMATION:
- PRRX is Sri Lanka's #1 Free Fire Gaming Panel
- Features: AIM ASSISTANCE (AIMBOT +++, AIMBOT HEAD, AIMBOT EXTERNAL, AIMBOT DRAG, FIX DRAG MOOD, MOUSE SETTINGS)
- VISUAL ENHANCEMENT: CHAMS MENU with ESP, CHAMS MENU V1 with Female Fix, 3D CHAMS MENU, BLUE CHAMS with 3D Fix, RED CHAMS with PANEL 3DBOX
- ANTI-CHEAT PROTECTIONS: ANTI CHEATES, ANTI REPORT, ANTI REPORT V1, OPTIMAIZ, FPS ++, FPS BOOST
- Main Menu: Key Bind, Settings Menu, Your PC Inform, Real Chat {Live}, Payment Method, Report Menu, About
- Payment Plans: 300 LKR (1 Week), 600 LKR (3 Weeks), 850 LKR (1 Month), 1500 LKR (6 Months), 2299 LKR (1 Year), 2499 LKR (1 Year+)
- Download: PRRX.HEX.1.rar from GitHub Releases
- WhatsApp Group: https://chat.whatsapp.com/EfnFIZp4RnGEKUqFRxajSx

RULES: Be helpful, friendly, and concise.
`;

        let conversationHistory = [];
        let currentUser = null;
        let messages = [];
        
        // ========== E2E ENCRYPTION ==========
        const ENCRYPTION_KEY = 'PRRX_CHAT_E2E_KEY_2026';
        
        function encryptData(data) {
            let encrypted = '';
            for (let i = 0; i < data.length; i++) {
                const keyChar = ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length);
                const dataChar = data.charCodeAt(i);
                encrypted += String.fromCharCode(dataChar ^ keyChar);
            }
            return btoa(encrypted);
        }
        
        function decryptData(encryptedData) {
            try {
                const decoded = atob(encryptedData);
                let decrypted = '';
                for (let i = 0; i < decoded.length; i++) {
                    const keyChar = ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length);
                    const dataChar = decoded.charCodeAt(i);
                    decrypted += String.fromCharCode(dataChar ^ keyChar);
                }
                return decrypted;
            } catch(e) { return null; }
        }
        
        const SecureStorage = {
            set: (key, value) => { localStorage.setItem(`secure_${key}`, encryptData(JSON.stringify(value))); },
            get: (key) => {
                const encrypted = localStorage.getItem(`secure_${key}`);
                if (!encrypted) return null;
                try { return JSON.parse(decryptData(encrypted)); } catch(e) { return null; }
            },
            remove: (key) => localStorage.removeItem(`secure_${key}`)
        };
        
        // ========== GET USER FROM SESSION ==========
        function getUserFromSession() {
            const session = localStorage.getItem('prrx_chat_session');
            if (session) {
                try {
                    const parsed = JSON.parse(session);
                    if (parsed && parsed.username) {
                        return parsed;
                    }
                } catch(e) {
                    console.error("Failed to parse session:", e);
                }
            }
            return null;
        }
        
        // ========== AI SELF-LEARNING ==========
        let aiLearningMemory = [];
        
        function loadLearnedResponses() {
            const learned = SecureStorage.get('ai_learned');
            if (learned) aiLearningMemory = learned;
        }
        
        function saveLearnedResponse(question, answer) {
            const exists = aiLearningMemory.find(item => item.question.toLowerCase() === question.toLowerCase());
            if (!exists) {
                aiLearningMemory.push({ question: question, answer: answer, learnedAt: new Date().toISOString() });
                SecureStorage.set('ai_learned', aiLearningMemory);
            }
        }
        
        function getLearnedResponse(question) {
            const learned = aiLearningMemory.find(item => 
                question.toLowerCase().includes(item.question.toLowerCase()) || 
                item.question.toLowerCase().includes(question.toLowerCase())
            );
            return learned ? learned.answer : null;
        }
        
        async function getAIResponse(userMessage, username) {
            const learnedResponse = getLearnedResponse(userMessage);
            if (learnedResponse) return `🤖 ${learnedResponse}`;
            
            try {
                const recentHistory = conversationHistory.slice(-5);
                let contextMessage = PRRX_KNOWLEDGE + `\n\nCurrent user: ${username}\n\nPrevious conversation:\n`;
                recentHistory.forEach(msg => { contextMessage += `${msg.sender}: ${msg.message}\n`; });
                contextMessage += `\nUser: ${userMessage}\n\nPRRX Bot:`;
                
                const response = await fetch(`${GEMINI_URL}?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: contextMessage }] }],
                        generationConfig: { temperature: 0.7, maxOutputTokens: 300 }
                    })
                });
                
                const data = await response.json();
                if (data.error) return fallbackResponse(userMessage);
                
                let aiResponse = data.candidates[0].content.parts[0].text;
                aiResponse = aiResponse.replace(/PRRX Bot:/gi, '').trim();
                saveLearnedResponse(userMessage, aiResponse);
                return aiResponse;
            } catch (error) {
                console.error("AI Error:", error);
                return fallbackResponse(userMessage);
            }
        }
        
        function fallbackResponse(message) {
            const lowerMsg = message.toLowerCase();
            if (lowerMsg.includes('aimbot')) return "🎯 AIMBOT: Go to Settings Menu > AIM ASSISTANCE. Toggle AIMBOT +++!";
            if (lowerMsg.includes('esp')) return "👁️ Visual Enhancement: Use CHAMS MENU for player highlighting!";
            if (lowerMsg.includes('price')) return "💰 PRRX Plans: 1 Week - 300 LKR | 1 Month - 850 LKR | 1 Year - 2299 LKR";
            if (lowerMsg.includes('download')) return "📥 Download: https://github.com/sayuzprx/prrxwebsite/releases/download/v3.2/PRRX.HEX.1.rar";
            return "I'm here to help! Ask me about AIMBOT, ESP, Anti-Cheat, pricing, or download.";
        }
        
        // ========== CHAT FUNCTIONS ==========
        function loadMessages() {
            const saved = SecureStorage.get('chat_messages');
            messages = saved ? saved : [];
            saveMessages();
            return messages;
        }
        
        function saveMessages() {
            SecureStorage.set('chat_messages', messages);
        }
        
        function addMessage(sender, message, isOwn = false, isBot = false) {
            const newMsg = {
                id: Date.now(),
                sender: sender,
                message: message,
                time: new Date().toLocaleTimeString(),
                isOwn: isOwn,
                isBot: isBot
            };
            messages.push(newMsg);
            saveMessages();
            if (!isBot) {
                conversationHistory.push({ sender: sender, message: message });
                if (conversationHistory.length > 20) conversationHistory.shift();
            }
            return newMsg;
        }
        
        function renderMessages() {
            const messagesDiv = document.getElementById('messages');
            if (!messagesDiv) return;
            messagesDiv.innerHTML = messages.map(msg => `
                <div class="message ${msg.isOwn ? 'message-own' : ''} ${msg.isBot ? 'bot-message' : ''}">
                    <div class="message-avatar">${msg.isBot ? '<i class="fas fa-robot"></i>' : msg.sender.charAt(0).toUpperCase()}</div>
                    <div class="message-content">
                        <div class="message-sender">${msg.sender} ${msg.isBot ? '(AI Bot)' : ''}</div>
                        <div class="message-text">${escapeHtml(msg.message).replace(/\n/g, '<br>')}</div>
                        <div class="message-time">${msg.time}</div>
                    </div>
                </div>
            `).join('');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function showTypingIndicator() {
            const messagesDiv = document.getElementById('messages');
            if (!messagesDiv) return;
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing-indicator';
            typingDiv.className = 'typing-indicator';
            typingDiv.innerHTML = '<span></span><span></span><span></span><span style="color:#888; margin-left:5px;">AI is thinking...</span>';
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function removeTypingIndicator() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || !currentUser) return;
            addMessage(currentUser.username, message, true, false);
            input.value = '';
            renderMessages();
            showTypingIndicator();
            try {
                const aiResponse = await getAIResponse(message, currentUser.username);
                removeTypingIndicator();
                addMessage("PRRX AI Bot", aiResponse, false, true);
                renderMessages();
            } catch (error) {
                removeTypingIndicator();
                addMessage("PRRX AI Bot", "Sorry, having trouble. Please try again!", false, true);
                renderMessages();
            }
        }
        
        function clearChat() {
            if (confirm("Clear all messages?")) {
                messages = [];
                addMessage("System", "Chat cleared by " + currentUser.username, false, false);
                addMessage("PRRX AI Bot", "Chat cleared! I'm ready to help you.", false, true);
                saveMessages();
                renderMessages();
                showToast("Chat cleared");
            }
        }
        
        function leaveChat() {
            showToast("🔒 Leaving chat...");
            localStorage.removeItem('prrx_chat_session');
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 500);
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        function renderChatInterface() {
            const app = document.getElementById('app');
            if (!app) return;
            
            app.innerHTML = `
                <div class="chat-container">
                    <div class="chat-header">
                        <h3><i class="fas fa-robot"></i> PRRX AI Assistant</h3>
                        <div class="user-info">
                            <i class="fas fa-user-shield"></i> ${currentUser?.username || 'User'}
                        </div>
                    </div>
                    <div class="chat-messages" id="messages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="messageInput" placeholder="Ask me anything about PRRX Panel..." onkeypress="if(event.key==='Enter') sendMessage()">
                        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Send</button>
                        <button onclick="clearChat()" class="clear-btn"><i class="fas fa-trash"></i> Clear</button>
                        <button onclick="leaveChat()" class="leave-btn"><i class="fas fa-sign-out-alt"></i> Leave</button>
                    </div>
                </div>
                <div class="security-footer">
                    <span><i class="fas fa-shield-alt"></i> E2E Encrypted</span>
                    <span><i class="fas fa-robot"></i> Gemini AI</span>
                    <span><i class="fas fa-brain"></i> Self-Learning</span>
                </div>
            `;
            
            renderMessages();
        }
        
        // ========== ANTI-DEBUGGING ==========
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) {
                e.preventDefault();
                showToast("🔒 Security: DevTools blocked");
                return false;
            }
        });
        
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); showToast("🔒 Right-click disabled"); return false; });
        
        // ========== CURSOR ==========
        if (window.innerWidth > 768) {
            const cd = document.querySelector('.cursor-dot');
            const co = document.querySelector('.cursor-outline');
            document.addEventListener('mousemove', (e) => {
                cd.style.transform = `translate(${e.clientX - 4}px, ${e.clientY - 4}px)`;
                co.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
            });
        }
        
        // ========== INIT ==========
        loadLearnedResponses();
        
        // Show loading
        const app = document.getElementById('app');
        app.innerHTML = `
            <div style="display: flex; justify-content: center; align-items: center; height: 70vh; flex-direction: column;">
                <div class="loading-spinner"></div>
                <p style="margin-top: 1rem; color: #2ecc71;">Loading chat...</p>
                <p style="margin-top: 0.5rem; font-size: 0.7rem; color: #666;">Checking session...</p>
            </div>
        `;
        
        // Load session and start chat immediately
        const sessionUser = getUserFromSession();
        console.log("🔐 Session check:", sessionUser);
        
        if (sessionUser && sessionUser.username) {
            currentUser = sessionUser;
            loadMessages();
            
            if (messages.length === 0) {
                addMessage("PRRX AI Bot", `Welcome back, ${currentUser.username}! 👋\n\nI'm your AI assistant powered by Google Gemini. Ask me about AIMBOT, ESP, Anti-Cheat, pricing, or anything about PRRX Panel!`, false, true);
            }
            
            renderChatInterface();
            console.log("✅ Chat loaded for user:", currentUser.username);
        } else {
            console.log("❌ No valid session found, redirecting to dashboard");
            showToast("No active session. Redirecting to dashboard...");
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        }
        
        window.sendMessage = sendMessage;
        window.clearChat = clearChat;
        window.leaveChat = leaveChat;
        
        console.log("%c🤖 PRRX ULTRA SECURE AI CHAT ACTIVE", "color: #2ecc71; font-size: 14px");
    </script>
</body>
