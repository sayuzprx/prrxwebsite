    <script type="module">
        import * as THREE from 'three';
        const canvas = document.getElementById('bg-canvas');
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x050b1a);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000); camera.position.set(0, 0, 5);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        const geometry = new THREE.TorusKnotGeometry(1.1, 0.28, 160, 24, 3, 4);
        const material = new THREE.MeshStandardMaterial({ color: 0x00e0ff, emissive: 0x1a4c8a, emissiveIntensity: 0.5 });
        const torusKnot = new THREE.Mesh(geometry, material); scene.add(torusKnot);
        const particleCount = 1200;
        const particlesGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const radius = 2.5 + Math.random() * 2.5;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            positions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
            positions[i*3+2] = radius * Math.cos(phi);
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleSystem = new THREE.Points(particlesGeometry, new THREE.PointsMaterial({ color: 0x66ccff, size: 0.04 }));
        scene.add(particleSystem);
        const ringGeo = new THREE.TorusGeometry(1.6, 0.04, 48, 400);
        const ring = new THREE.Mesh(ringGeo, new THREE.MeshStandardMaterial({ color: 0x00aaff, emissive: 0x0088ff, emissiveIntensity: 0.4 }));
        scene.add(ring);
        const ambientLight = new THREE.AmbientLight(0x111122); scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x2266ff, 0.8); pointLight.position.set(2, 3, 4); scene.add(pointLight);
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for (let i = 0; i < 600; i++) { starPos.push((Math.random() - 0.5) * 150); starPos.push((Math.random() - 0.5) * 80); starPos.push((Math.random() - 0.5) * 40 - 15); }
        starGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.06 }));
        scene.add(stars);
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            torusKnot.rotation.x += 0.008; torusKnot.rotation.y += 0.012;
            ring.rotation.x = Math.sin(time * 0.5) * 0.3; ring.rotation.y += 0.01;
            particleSystem.rotation.y += 0.0005;
            stars.rotation.y += 0.0002;
            camera.lookAt(0, 0, 0);
            renderer.render(scene, camera);
            time += 0.008;
        }
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
    <script>
        // ========== LOADING SCREEN ==========
        let loadingProgress = 0;
        const percentageElement = document.getElementById('loadingPercentage');
        function updateLoadingProgress() {
            const interval = setInterval(() => {
                loadingProgress += Math.random() * 12;
                if (loadingProgress >= 100) { loadingProgress = 100; clearInterval(interval); }
                if (percentageElement) percentageElement.textContent = Math.floor(loadingProgress) + '%';
            }, 120);
        }
        
        function createLoadingParticles() {
            const container = document.getElementById('loadingParticles');
            if (!container) return;
            for (let i = 0; i < 80; i++) {
                const particle = document.createElement('div');
                particle.className = 'loading-particle';
                particle.style.left = Math.random() * window.innerWidth + 'px';
                particle.style.top = window.innerHeight + Math.random() * 150 + 'px';
                particle.style.setProperty('--x', (Math.random() - 0.5) * 150 + 'px');
                particle.style.animationDelay = Math.random() * 2 + 's';
                particle.style.animationDuration = 1.5 + Math.random() * 1.5 + 's';
                container.appendChild(particle);
            }
        }
        
        updateLoadingProgress();
        createLoadingParticles();
        
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loadingScreen = document.getElementById('loadingScreen');
                loadingScreen.classList.add('hidden');
                setTimeout(() => { if (loadingScreen) loadingScreen.style.display = 'none'; }, 600);
            }, 1400);
        });
        
        // ========== ULTRA SECURE ENCRYPTION ==========
        const ENCRYPTION_KEY = 'PRRX_HWID_ULTRA_SECURE_2026';
        
        function encryptData(data) {
            let encrypted = '';
            for (let i = 0; i < data.length; i++) {
                const keyChar = ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length);
                const dataChar = data.charCodeAt(i);
                encrypted += String.fromCharCode(dataChar ^ keyChar);
            }
            return btoa(encrypted);
        }
        
        function decryptData(encryptedData) {
            try {
                const decoded = atob(encryptedData);
                let decrypted = '';
                for (let i = 0; i < decoded.length; i++) {
                    const keyChar = ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length);
                    const dataChar = decoded.charCodeAt(i);
                    decrypted += String.fromCharCode(dataChar ^ keyChar);
                }
                return decrypted;
            } catch(e) { return null; }
        }
        
        const SecureStorage = {
            set: (key, value) => { localStorage.setItem(`secure_${key}`, encryptData(JSON.stringify(value))); },
            get: (key) => {
                const encrypted = localStorage.getItem(`secure_${key}`);
                if (!encrypted) return null;
                try { return JSON.parse(decryptData(encrypted)); } catch(e) { return null; }
            },
            remove: (key) => localStorage.removeItem(`secure_${key}`)
        };
        
        // ========== HWID GENERATION ==========
        function generateHWID() {
            const components = [
                navigator.userAgent,
                navigator.language,
                screen.width + 'x' + screen.height,
                screen.colorDepth,
                new Date().getTimezoneOffset(),
                navigator.hardwareConcurrency || 4,
                navigator.deviceMemory || 4,
                navigator.platform,
                navigator.maxTouchPoints || 0,
                window.screen.pixelDepth
            ];
            let hash = 0;
            const str = components.join('|');
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash).toString(16).toUpperCase();
        }
        
        const CURRENT_HWID = generateHWID();
        
        // ========== USER DATABASE ==========
        function initDatabase() {
            let users = SecureStorage.get('users');
            if (!users) {
                users = {};
                SecureStorage.set('users', users);
            }
            return users;
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
        
        // ========== PASSWORD STRENGTH ==========
        function checkPasswordStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            return strength;
        }
        
        // ========== REGISTER ==========
        function register(username, email, password) {
            if (!username || !email || !password) {
                showToast("❌ Please fill all fields");
                return false;
            }
            if (username.length < 3) {
                showToast("❌ Username must be at least 3 characters");
                return false;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showToast("❌ Invalid email format");
                return false;
            }
            if (password.length < 8) {
                showToast("❌ Password must be at least 8 characters");
                return false;
            }
            
            const users = SecureStorage.get('users');
            if (users[username]) {
                showToast("❌ Username already exists");
                return false;
            }
            
            users[username] = {
                username: username,
                email: email,
                password: password,
                hwid: CURRENT_HWID,
                registeredAt: new Date().toISOString(),
                lastLogin: null,
                loginCount: 0
            };
            SecureStorage.set('users', users);
            
            showToast(`✅ Registration successful! HWID locked to this device.`);
            showLoginForm();
            return true;
        }
        
        // ========== LOGIN ==========
        function login(username, password) {
            const users = SecureStorage.get('users');
            
            if (!users[username]) {
                showToast("❌ Username not found");
                return false;
            }
            
            if (users[username].password !== password) {
                showToast("❌ Incorrect password");
                return false;
            }
            
            if (users[username].hwid !== CURRENT_HWID) {
                showToast("❌ HWID MISMATCH! This account is locked to another device.");
                showToast("🔒 Contact support to reset HWID");
                return false;
            }
            
            users[username].lastLogin = new Date().toISOString();
            users[username].loginCount = (users[username].loginCount || 0) + 1;
            SecureStorage.set('users', users);
            
            const session = {
                username: username,
                email: users[username].email,
                hwid: CURRENT_HWID,
                loginTime: new Date().toISOString()
            };
            SecureStorage.set('session', session);
            
            showToast(`✅ Welcome back, ${username}! HWID verified.`);
            renderUserDashboard(username);
            return true;
        }
        
        // ========== LOGOUT ==========
        function logout() {
            SecureStorage.remove('session');
            showToast("🔒 Logged out successfully");
            showLoginForm();
        }
        
        // ========== CHECK SESSION ==========
        function checkSession() {
            const session = SecureStorage.get('session');
            if (session && session.hwid === CURRENT_HWID) {
                renderUserDashboard(session.username);
                return true;
            }
            return false;
        }
        
        // ========== UI RENDERING WITH LOGIN & REGISTER TABS ==========
        function showLoginForm() {
            document.getElementById('appContainer').innerHTML = `
                <div class="auth-card fade-up">
                    <div class="tabs">
                        <button class="tab-btn active" id="loginTabBtn">🔐 Login</button>
                        <button class="tab-btn" id="registerTabBtn">📝 Register</button>
                    </div>
                    
                    <div id="loginPanel">
                        <div class="hwid-box">
                            <i class="fas fa-microchip"></i> Device HWID: <span style="color:#00e0ff;">${CURRENT_HWID.substring(0, 20)}...</span>
                        </div>
                        
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" id="loginUsername" placeholder="Username" autocomplete="off">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="loginPassword" placeholder="Password" autocomplete="off">
                        </div>
                        <button class="submit-btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
                    </div>
                    
                    <div id="registerPanel" style="display: none;">
                        <div class="hwid-box">
                            <i class="fas fa-microchip"></i> Device HWID: <span style="color:#00e0ff;">${CURRENT_HWID.substring(0, 20)}...</span>
                            <br><small style="color:#4caf50;">⚠️ This HWID will be permanently locked to your account</small>
                        </div>
                        
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" id="regUsername" placeholder="Username (min 3 chars)" autocomplete="off">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="regEmail" placeholder="Email Address" autocomplete="off">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="regPassword" placeholder="Password (min 8 chars)" autocomplete="off" onkeyup="updateStrength()">
                        </div>
                        <div class="password-strength" id="strengthIndicator">
                            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-check-circle"></i>
                            <input type="password" id="regConfirmPassword" placeholder="Confirm Password" autocomplete="off">
                        </div>
                        <button class="submit-btn" id="registerBtn"><i class="fas fa-user-plus"></i> Register & Lock HWID</button>
                    </div>
                    
                    <div class="back-link">
                        <a href="dashboard.html"><i class="fas fa-arrow-left"></i> Back to Dashboard Selection</a>
                    </div>
                    
                    <div style="margin-top: 1rem; text-align: center; font-size: 0.65rem; color: #8e9eb5;">
                        <i class="fas fa-fingerprint"></i> HWID Locked Account | Device verification required
                    </div>
                </div>
            `;
            
            // Tab switching
            const loginTab = document.getElementById('loginTabBtn');
            const registerTab = document.getElementById('registerTabBtn');
            const loginPanel = document.getElementById('loginPanel');
            const registerPanel = document.getElementById('registerPanel');
            
            loginTab.addEventListener('click', () => {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginPanel.style.display = 'block';
                registerPanel.style.display = 'none';
            });
            
            registerTab.addEventListener('click', () => {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                loginPanel.style.display = 'none';
                registerPanel.style.display = 'block';
            });
            
            // Login button
            document.getElementById('loginBtn').addEventListener('click', () => {
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value;
                login(username, password);
            });
            
            // Register button
            document.getElementById('registerBtn').addEventListener('click', () => {
                const username = document.getElementById('regUsername').value.trim();
                const email = document.getElementById('regEmail').value.trim();
                const password = document.getElementById('regPassword').value;
                const confirm = document.getElementById('regConfirmPassword').value;
                
                if (password !== confirm) {
                    showToast("❌ Passwords do not match");
                    return;
                }
                register(username, email, password);
            });
            
            // Enter key press
            document.getElementById('loginUsername')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });
            document.getElementById('loginPassword')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });
        }
        
        function updateStrength() {
            const password = document.getElementById('regPassword')?.value || '';
            const strength = checkPasswordStrength(password);
            const fill = document.getElementById('strengthFill');
            if (!fill) return;
            const colors = ['#ff4444', '#ffaa44', '#ffff44', '#44ff44'];
            const widths = ['25%', '50%', '75%', '100%'];
            if (strength > 0) {
                fill.style.width = widths[strength - 1];
                fill.style.background = colors[strength - 1];
            } else {
                fill.style.width = '0%';
            }
        }
        
        function renderUserDashboard(username) {
            const users = SecureStorage.get('users');
            const userData = users[username];
            const registeredDate = new Date(userData.registeredAt).toLocaleDateString();
            const lastLogin = userData.lastLogin ? new Date(userData.lastLogin).toLocaleString() : 'First login';
            
            document.getElementById('appContainer').innerHTML = `
                <div class="dashboard-card fade-up">
                    <div class="user-avatar">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <h2>${username}</h2>
                    <p><i class="fas fa-envelope"></i> ${userData.email}</p>
                    
                    <div class="info-grid">
                        <div class="info-item"><div class="label">Account Created</div><div class="value">${registeredDate}</div></div>
                        <div class="info-item"><div class="label">Last Login</div><div class="value">${lastLogin}</div></div>
                        <div class="info-item"><div class="label">Login Count</div><div class="value">${userData.loginCount}</div></div>
                        <div class="info-item"><div class="label">HWID Status</div><div class="value" style="color:#4caf50;">Locked ✓</div></div>
                    </div>
                    
                    <div class="hwid-locked">
                        <i class="fas fa-fingerprint"></i> Device HWID: ${CURRENT_HWID.substring(0, 20)}...
                        <br><small>This account is locked to this device</small>
                    </div>
                    
                    <div style="background: rgba(0,224,255,0.1); border-radius: 16px; padding: 0.8rem; margin: 1rem 0;">
                        <i class="fas fa-gem"></i> PRRX Premium Access
                        <div style="font-size: 0.7rem;">HWID Lock Active | Secure Session</div>
                    </div>
                    
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    
                    <div class="back-link" style="margin-top: 1rem;">
                        <a href="dashboard.html"><i class="fas fa-arrow-left"></i> Back to Dashboard Selection</a>
                    </div>
                </div>
            `;
            
            document.getElementById('logoutBtn').addEventListener('click', logout);
        }
        
        // ========== ANTI-DEBUGGING ==========
        let devToolsOpen = false;
        setInterval(() => {
            const start = performance.now();
            debugger;
            const end = performance.now();
            if (end - start > 100 && !devToolsOpen) {
                devToolsOpen = true;
                document.getElementById('antiDevTools').classList.add('active');
            }
        }, 2000);
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || 
                (e.ctrlKey && e.key === 'u') || (e.ctrlKey && e.key === 'U') ||
                (e.ctrlKey && e.key === 's') || (e.ctrlKey && e.key === 'S')) {
                e.preventDefault();
                showToast("🔒 Ultra Secure: Action blocked");
                return false;
            }
        });
        
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); showToast("🔒 Right-click disabled"); return false; });
        document.addEventListener('selectstart', (e) => e.preventDefault());
        if (window.self !== window.top) { window.top.location = window.self.location; }
        
        // Custom Cursor
        if (window.innerWidth > 768) {
            const cd = document.querySelector('.cursor-dot'), co = document.querySelector('.cursor-outline');
            if (cd && co) {
                document.addEventListener('mousemove', (e) => {
                    cd.style.transform = `translate(${e.clientX - 4}px, ${e.clientY - 4}px)`;
                    co.style.transform = `translate(${e.clientX - 16}px, ${e.clientY - 16}px)`;
                });
                document.querySelectorAll('a, button, .auth-card, .dashboard-card').forEach(el => {
                    el.addEventListener('mouseenter', () => { co.style.width = '48px'; co.style.height = '48px'; co.style.borderColor = '#a020f0'; });
                    el.addEventListener('mouseleave', () => { co.style.width = '32px'; co.style.height = '32px'; co.style.borderColor = 'rgba(0,224,255,0.6)'; });
                });
            }
        }
        
        // Scroll animations
        const fadeElements = document.querySelectorAll('.fade-up');
        const observer = new IntersectionObserver((e) => { e.forEach(entry => { if (entry.isIntersecting) { entry.target.classList.add('visible'); observer.unobserve(entry.target); } }); }, { threshold: 0.1 });
        fadeElements.forEach(el => observer.observe(el));
        
        // Make functions global
        window.updateStrength = updateStrength;
        
        // Initialize
        initDatabase();
        if (!checkSession()) { showLoginForm(); }
        
        console.log("%c🔐 PRRX ULTRA SECURE LOGIN ACTIVE", "color: #00e0ff; font-size: 14px; font-weight: bold;");
        console.log(`%cDevice HWID: ${CURRENT_HWID}`, "color: #a020f0; font-size: 11px;");
        console.log("%c⚠️ HWID Lock Active | Login & Register Available | E2E Encrypted", "color: #ffaa00; font-size: 11px;");
    </script>
</body>
</html>
