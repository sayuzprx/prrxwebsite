<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRRX | Live Chat</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2"/>
                    <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2"/>
                    <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span>PRRX</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">HOME</a>
                <a href="features.html" class="nav-link">FEATURES</a>
                <a href="live-chat.html" class="nav-link active">LIVE CHAT</a>
                <a href="dashboard.html" class="nav-link">DASHBOARD</a>
            </div>
        </div>
    </nav>

    <main class="chat-page">
        <div class="chat-container">
            <div class="chat-sidebar">
                <div class="chat-user-info" id="chatUserInfo">
                    <div class="user-avatar-placeholder">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <div class="user-details">
                        <h4>Guest User</h4>
                        <p>Login to chat</p>
                    </div>
                </div>
                <div class="chat-rooms">
                    <h3>Chat Rooms</h3>
                    <div class="room-list">
                        <div class="room-item active">
                            <span>💬</span>
                            <span>General Chat</span>
                            <span class="room-badge">12</span>
                        </div>
                        <div class="room-item">
                            <span>🎮</span>
                            <span>Free Fire Talk</span>
                            <span class="room-badge">8</span>
                        </div>
                        <div class="room-item">
                            <span>⚡</span>
                            <span>PRRX Support</span>
                            <span class="room-badge">5</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="chat-main">
                <div class="chat-header">
                    <h3>General Chat</h3>
                    <span class="online-status">● 24 online</span>
                </div>
                
                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-message">
                        <p>Welcome to PRRX Live Chat!</p>
                        <p>Please login with Google to join the conversation.</p>
                    </div>
                </div>
                
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Type your message..." disabled>
                    <button id="sendBtn" disabled>Send</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { auth, onAuthStateChanged } from './firebase-config.js';
        import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
        
        const db = getDatabase();
        let currentUser = null;
        
        // Check auth
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const chatUserInfo = document.getElementById('chatUserInfo');
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            
            if (user) {
                chatUserInfo.innerHTML = `
                    <img src="${user.photoURL || 'https://ui-avatars.com/api/?name=' + user.displayName}" class="user-avatar">
                    <div class="user-details">
                        <h4>${user.displayName || user.email}</h4>
                        <p>Online</p>
                    </div>
                `;
                chatInput.disabled = false;
                sendBtn.disabled = false;
                
                // Load messages
                loadMessages();
            } else {
                chatUserInfo.innerHTML = `
                    <div class="user-avatar-placeholder">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <div class="user-details">
                        <h4>Guest User</h4>
                        <p><a href="dashboard.html" style="color: #00ff88;">Login to chat</a></p>
                    </div>
                `;
                chatInput.disabled = true;
                sendBtn.disabled = true;
            }
            
            // Update navbar
            const navContainer = document.querySelector('.nav-container');
            const existingAuth = document.querySelector('.nav-auth');
            if (existingAuth) existingAuth.remove();
            
            const authDiv = document.createElement('div');
            authDiv.className = 'nav-auth';
            
            if (user) {
                authDiv.innerHTML = `
                    <div class="user-menu">
                        <img src="${user.photoURL}" class="user-avatar-small">
                        <span>${user.displayName}</span>
                    </div>
                `;
            } else {
                authDiv.innerHTML = `<button class="login-nav-btn" onclick="window.location.href='dashboard.html'">Login</button>`;
            }
            navContainer.appendChild(authDiv);
        });
        
        function loadMessages() {
            const messagesRef = ref(db, 'chats/general');
            const chatMessages = document.getElementById('chatMessages');
            
            onChildAdded(messagesRef, (snapshot) => {
                const message = snapshot.val();
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${message.uid === currentUser?.uid ? 'message-own' : 'message-other'}`;
                messageDiv.innerHTML = `
                    <div class="message-sender">${message.name}</div>
                    <div class="message-text">${message.text}</div>
                    <div class="message-time">${new Date(message.timestamp).toLocaleTimeString()}</div>
                `;
                chatMessages.appendChild(messageDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }
        
        document.getElementById('sendBtn')?.addEventListener('click', () => {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (text && currentUser) {
                const messagesRef = ref(db, 'chats/general');
                push(messagesRef, {
                    text: text,
                    name: currentUser.displayName || currentUser.email,
                    uid: currentUser.uid,
                    photoURL: currentUser.photoURL,
                    timestamp: serverTimestamp()
                });
                input.value = '';
            }
        });
        
        document.getElementById('chatInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('sendBtn').click();
            }
        });
    </script>
</body>
</html>
