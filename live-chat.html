<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PRRX | Live Chat - Loading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(46,204,113,0.05) 0%, transparent 50%);
            animation: rotateBg 20s linear infinite;
        }
        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .loading-container {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 400px;
            width: 90%;
            padding: 2rem;
            background: rgba(20,20,20,0.8);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            border: 1px solid rgba(46,204,113,0.3);
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #2ecc71);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(46,204,113,0.2);
            border-top: 3px solid #2ecc71;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 1.5rem auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .loading-text {
            font-size: 1rem;
            color: #2ecc71;
            letter-spacing: 2px;
        }
        
        .hwid-text {
            font-size: 0.7rem;
            color: #666;
            margin-top: 1rem;
            font-family: monospace;
        }
        
        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(46,204,113,0.2);
            border-radius: 3px;
            overflow: hidden;
            margin: 1rem 0;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            animation: progress 1.5s ease-out forwards;
        }
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        
        .security-badge {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
            font-size: 0.65rem;
            color: #2ecc71;
        }
        
        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.05s ease;
            box-shadow: 0 0 10px #2ecc71;
        }
        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(46,204,113,0.6);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transition: transform 0.15s ease, width 0.2s, height 0.2s;
            backdrop-filter: blur(2px);
        }
        @media (max-width: 768px) { .cursor-dot, .cursor-outline { display: none; } }
    </style>
</head>
<body>

    <div class="bg-animation"></div>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <div class="loading-container">
        <div class="logo">PRRX</div>
        <div class="spinner"></div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <div class="loading-text">Verifying Access...</div>
        <div class="hwid-text" id="hwidDisplay">Loading HWID...</div>
        <div class="security-badge">
            <span><i class="fas fa-shield-alt"></i> HWID Protected</span>
            <span><i class="fas fa-lock"></i> Secure Channel</span>
        </div>
    </div>

    <script>
        // ========== SAME ENCRYPTION AS DASHBOARD ==========
        const ENCRYPTION_KEY = 'PRRX_HWID_KEY_2026_SECURE';
        
        function encryptData(data) {
            let encrypted = '';
            for (let i = 0; i < data.length; i++) {
                const keyChar = ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length);
                const dataChar = data.charCodeAt(i);
                encrypted += String.fromCharCode(dataChar ^ keyChar);
            }
            return btoa(encrypted);
        }
        
        function decryptData(encryptedData) {
            try {
                const decoded = atob(encryptedData);
                let decrypted = '';
                for (let i = 0; i < decoded.length; i++) {
                    const keyChar = ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length);
                    const dataChar = decoded.charCodeAt(i);
                    decrypted += String.fromCharCode(dataChar ^ keyChar);
                }
                return decrypted;
            } catch(e) { return null; }
        }
        
        const SecureStorage = {
            set: (key, value) => { localStorage.setItem(`secure_${key}`, encryptData(JSON.stringify(value))); },
            get: (key) => {
                const encrypted = localStorage.getItem(`secure_${key}`);
                if (!encrypted) return null;
                try { return JSON.parse(decryptData(encrypted)); } catch(e) { return null; }
            },
            remove: (key) => localStorage.removeItem(`secure_${key}`)
        };
        
        // ========== SAME HWID GENERATION AS DASHBOARD ==========
        function generateHWID() {
            const components = [
                navigator.userAgent,
                navigator.language,
                screen.width + 'x' + screen.height,
                screen.colorDepth,
                new Date().getTimezoneOffset(),
                navigator.hardwareConcurrency || 4,
                navigator.deviceMemory || 4,
                navigator.platform,
                navigator.maxTouchPoints || 0,
                window.screen.pixelDepth
            ];
            let hash = 0;
            const str = components.join('|');
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash).toString(16).toUpperCase();
        }
        
        const CURRENT_HWID = generateHWID();
        document.getElementById('hwidDisplay').innerHTML = `<i class="fas fa-microchip"></i> HWID: ${CURRENT_HWID.substring(0, 16)}...`;
        
        // ========== CHECK LOGIN STATUS ==========
        function isUserLoggedIn() {
            // Check SecureStorage session (same as dashboard)
            const session = SecureStorage.get('session');
            if (session && session.hwid === CURRENT_HWID) {
                return { loggedIn: true, user: session };
            }
            
            // Check dashboard session in localStorage
            const dashSession = localStorage.getItem('prrx_dashboard_session');
            if (dashSession) {
                try {
                    const parsed = JSON.parse(dashSession);
                    if (parsed.hwid === CURRENT_HWID) {
                        return { loggedIn: true, user: parsed };
                    }
                } catch(e) {}
            }
            
            // Check users database for HWID match
            const users = SecureStorage.get('users');
            if (users) {
                for (const [username, userData] of Object.entries(users)) {
                    if (userData.hwid === CURRENT_HWID) {
                        return { loggedIn: true, user: { username: username, hwid: CURRENT_HWID } };
                    }
                }
            }
            
            return { loggedIn: false, user: null };
        }
        
        // ========== REDIRECT AFTER CHECK ==========
        setTimeout(() => {
            const loginStatus = isUserLoggedIn();
            console.log("🔐 HWID:", CURRENT_HWID);
            console.log("👤 Logged In:", loginStatus.loggedIn);
            
            if (loginStatus.loggedIn && loginStatus.user) {
                // Save session for chat access
                localStorage.setItem('prrx_chat_session', JSON.stringify(loginStatus.user));
                console.log("✅ Logged in - Redirecting to chat...");
                window.location.href = 'chat-interface.html';
            } else {
                console.log("❌ Not logged in - Redirecting to dashboard...");
                window.location.href = 'dashboard.html';
            }
        }, 2000);
        
        // ========== CURSOR ==========
        if (window.innerWidth > 768) {
            const cd = document.querySelector('.cursor-dot');
            const co = document.querySelector('.cursor-outline');
            document.addEventListener('mousemove', (e) => {
                cd.style.transform = `translate(${e.clientX - 4}px, ${e.clientY - 4}px)`;
                co.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
            });
        }
        
        console.log("%c🔐 PRRX CHAT LOADING SCREEN", "color: #2ecc71; font-size: 14px");
    </script>
</body>
</html>
