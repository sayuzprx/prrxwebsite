<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PRRX | Real-Time Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(46,204,113,0.05) 0%, transparent 50%);
            animation: rotateBg 20s linear infinite;
        }
        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.05s ease;
            box-shadow: 0 0 10px #2ecc71;
        }
        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(46,204,113,0.6);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transition: transform 0.15s ease, width 0.2s, height 0.2s;
            backdrop-filter: blur(2px);
        }
        @media (max-width: 768px) { .cursor-dot, .cursor-outline { display: none; } }
        
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 1px solid rgba(46,204,113,0.3);
        }
        .logo { 
            font-size: 1.5rem; 
            font-weight: 800; 
            background: linear-gradient(135deg, #fff, #2ecc71); 
            -webkit-background-clip: text; 
            background-clip: text; 
            color: transparent; 
            text-decoration: none;
        }
        .menu { display: flex; gap: 2rem; }
        .menu a { 
            color: #fff; 
            text-decoration: none; 
            font-weight: 500; 
            transition: all 0.3s;
            position: relative;
        }
        .menu a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0%;
            height: 2px;
            background: #2ecc71;
            transition: width 0.3s;
        }
        .menu a:hover::after { width: 100%; }
        .menu a:hover { color: #2ecc71; }
        
        .container {
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
            padding: 6rem 1.5rem 2rem;
            min-height: 100vh;
        }
        
        .join-screen {
            text-align: center;
            padding: 2.5rem;
            background: rgba(20,20,20,0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            max-width: 450px;
            margin: 0 auto;
        }
        .join-screen i { font-size: 4rem; color: #2ecc71; margin-bottom: 1rem; }
        .join-screen input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(46,204,113,0.3);
            border-radius: 50px;
            color: white;
            margin: 1rem 0;
            text-align: center;
        }
        .join-screen input:focus { border-color: #2ecc71; }
        .join-screen button {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }
        
        .chat-container {
            background: rgba(20,20,20,0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(46,204,113,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 70vh;
        }
        
        .chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(46,204,113,0.2);
            background: rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h3 { font-size: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .chat-header h3 i { color: #2ecc71; }
        .user-badge {
            font-size: 0.8rem;
            color: #2ecc71;
            background: rgba(46,204,113,0.15);
            padding: 0.3rem 1rem;
            border-radius: 20px;
        }
        
        .chat-messages {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        
        .message {
            display: flex;
            gap: 0.8rem;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        .message-content {
            flex: 1;
            background: rgba(255,255,255,0.05);
            padding: 0.6rem 1rem;
            border-radius: 18px;
            max-width: 70%;
        }
        .message-own { justify-content: flex-end; }
        .message-own .message-content {
            background: rgba(46,204,113,0.15);
            border: 1px solid rgba(46,204,113,0.3);
        }
        .message-sender {
            font-size: 0.7rem;
            color: #2ecc71;
            margin-bottom: 0.2rem;
        }
        .message-text { font-size: 0.85rem; word-wrap: break-word; }
        .message-time {
            font-size: 0.55rem;
            color: #666;
            margin-top: 0.2rem;
            text-align: right;
        }
        
        .chat-input-area {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            border-top: 1px solid rgba(46,204,113,0.2);
        }
        .chat-input-area input {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(46,204,113,0.3);
            border-radius: 30px;
            padding: 0.8rem 1rem;
            color: white;
            outline: none;
        }
        .chat-input-area input:focus { border-color: #2ecc71; }
        .chat-input-area button {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            border-radius: 30px;
            padding: 0.8rem 1.2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2ecc71;
            color: #0a0a0a;
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 10000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }
        .toast.show { transform: translateX(0); }
        
        @media (max-width: 768px) {
            .navbar { padding: 0.8rem 1rem; }
            .menu { gap: 1rem; }
        }
    </style>
</head>
<body>

    <div class="bg-animation"></div>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <div class="navbar">
        <a href="index.html" class="logo">PRRX</a>
        <div class="menu">
            <a href="index.html">HOME</a>
            <a href="features.html">FEATURES</a>
            <a href="live-chat.html">CHAT</a>
            <a href="dashboard.html">DASHBOARD</a>
        </div>
    </div>

    <div class="container" id="app"></div>
    <div id="toast" class="toast"></div>

    <script>
        // ========== FIREBASE CONFIGURATION ==========
        // ✅ YOUR DATABASE URL
        const firebaseConfig = {
            apiKey: "AIzaSyCrRkBSSsLJkPQLFSetLSvyfaJ0IihZWKg",
            authDomain: "prrx-chat.firebaseapp.com",
            projectId: "prrx-chat",
            storageBucket: "prrx-chat.firebasestorage.app",
            messagingSenderId: "763130047676",
            appId: "1:763130047676:web:e6566f250e81b9c6b574b9",
            measurementId: "G-SQ0GGFJ704",
            databaseURL: "https://prrx-chat-default-rtdb.firebaseio.com"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const messagesRef = database.ref('messages');
        
        // ========== BOT COMMANDS ==========
        const COMMANDS = `📋 **Available Commands:**
• !help - Show this menu
• !aimbot - AIMBOT guide
• !esp - Visual Enhancement guide
• !price - Pricing information
• !download - Download link
• !tip - Random tip`;
        
        function getBotResponse(message) {
            const m = message.toLowerCase();
            if (m.includes('hi') || m.includes('hello') || m.includes('hey')) {
                return "Hello! 👋 Need help? Type `!help` for commands!";
            }
            if (m.includes('!help') || m.includes('help')) {
                return COMMANDS;
            }
            if (m.includes('!aimbot') || m.includes('aimbot')) {
                return "🎯 **AIMBOT:** Go to Settings Menu > AIM ASSISTANCE. Toggle AIMBOT +++ for max accuracy!";
            }
            if (m.includes('!esp') || m.includes('esp')) {
                return "👁️ **Visual Enhancement:** Use CHAMS MENU for player highlighting and ESP for location tracking!";
            }
            if (m.includes('!price') || m.includes('price')) {
                return "💰 **PRRX Plans:** 1 Week - 300 LKR | 1 Month - 850 LKR | 1 Year - 2299 LKR";
            }
            if (m.includes('!download') || m.includes('download')) {
                return "📥 **Download:** https://github.com/sayuzprx/prrxwebsite/releases/download/v3.2/PRRX.HEX.1.rar";
            }
            if (m.includes('!tip') || m.includes('tip')) {
                return "💡 **Tip:** Use Key Bind to quickly toggle features in-game! Press F2 for AIMBOT!";
            }
            return null;
        }
        
        // ========== WELCOME MESSAGES ==========
        const welcomeMessages = [
            "🎉 Welcome to PRRX Chat! Type `!help` to see available commands!",
            "👋 Hey there! Need help with PRRX? Type `!aimbot` or `!esp`!",
            "🔥 Welcome! Chat with other users! Type `!help` for commands!",
            "💬 You're now in PRRX Live Chat! Be respectful and have fun!"
        ];
        
        function getRandomWelcome() {
            return welcomeMessages[Math.floor(Math.random() * welcomeMessages.length)];
        }
        
        // ========== CHAT STATE ==========
        let currentUser = null;
        
        // ========== FIREBASE FUNCTIONS ==========
        function sendMessage(text) {
            if (!text.trim() || !currentUser) return;
            
            const message = {
                sender: currentUser.username,
                text: text.trim(),
                timestamp: Date.now()
            };
            
            messagesRef.push(message);
        }
        
        function loadMessages() {
            messagesRef.on('child_added', (snapshot) => {
                const msg = snapshot.val();
                const isOwn = currentUser && msg.sender === currentUser.username;
                const messagesDiv = document.getElementById('messages');
                if (messagesDiv) {
                    const msgHtml = `
                        <div class="message ${isOwn ? 'message-own' : ''}">
                            <div class="message-avatar">${msg.sender.charAt(0).toUpperCase()}</div>
                            <div class="message-content">
                                <div class="message-sender">${escapeHtml(msg.sender)}</div>
                                <div class="message-text">${escapeHtml(msg.text)}</div>
                                <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                            </div>
                        </div>
                    `;
                    messagesDiv.insertAdjacentHTML('beforeend', msgHtml);
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
            });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        function renderChatInterface() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="chat-container">
                    <div class="chat-header">
                        <h3><i class="fas fa-fire"></i> PRRX Real-Time Chat</h3>
                        <div class="user-badge"><i class="fas fa-user"></i> ${currentUser.username}</div>
                    </div>
                    <div class="chat-messages" id="messages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessageFromInput()">
                        <button onclick="sendMessageFromInput()"><i class="fas fa-paper-plane"></i> Send</button>
                    </div>
                </div>
            `;
            
            const messagesDiv = document.getElementById('messages');
            if (messagesDiv) messagesDiv.innerHTML = '';
            
            loadMessages();
        }
        
        function sendMessageFromInput() {
            const input = document.getElementById('messageInput');
            const message = input.value;
            if (message.trim()) {
                sendMessage(message);
                input.value = '';
                
                const botResponse = getBotResponse(message);
                if (botResponse) {
                    setTimeout(() => {
                        const botMessage = {
                            sender: "PRRX Bot",
                            text: botResponse,
                            timestamp: Date.now()
                        };
                        messagesRef.push(botMessage);
                    }, 500);
                }
            }
        }
        
        function showJoinScreen() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="join-screen">
                    <i class="fas fa-comments"></i>
                    <h2>PRRX Real-Time Chat</h2>
                    <p style="color: #888; margin-bottom: 1rem;">🔥 Powered by Firebase | Real-time messaging</p>
                    <p style="color: #2ecc71; margin-bottom: 1rem;">Messages sync across ALL users instantly!</p>
                    <input type="text" id="usernameInput" placeholder="Enter your username" maxlength="20">
                    <button id="joinBtn">Join Chat</button>
                </div>
            `;
            
            document.getElementById('joinBtn').onclick = () => {
                const username = document.getElementById('usernameInput').value.trim();
                if (!username) { showToast("Please enter a username"); return; }
                if (username.length < 2) { showToast("Username must be at least 2 characters"); return; }
                
                currentUser = { username: username };
                
                const welcomeText = getRandomWelcome();
                sendMessage(welcomeText);
                
                setTimeout(() => {
                    sendMessage(COMMANDS);
                }, 800);
                
                renderChatInterface();
            };
            
            document.getElementById('usernameInput').onkeypress = (e) => {
                if (e.key === 'Enter') document.getElementById('joinBtn').click();
            };
        }
        
        // ========== SECURITY ==========
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) {
                e.preventDefault();
                showToast("🔒 DevTools blocked");
                return false;
            }
        });
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); showToast("🔒 Right-click disabled"); return false; });
        
        // Cursor
        if (window.innerWidth > 768) {
            const cd = document.querySelector('.cursor-dot');
            const co = document.querySelector('.cursor-outline');
            document.addEventListener('mousemove', (e) => {
                cd.style.transform = `translate(${e.clientX - 4}px, ${e.clientY - 4}px)`;
                co.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
            });
        }
        
        // ========== INIT ==========
        showJoinScreen();
        
        window.sendMessageFromInput = sendMessageFromInput;
        
        console.log("%c💬 PRRX REAL-TIME CHAT ACTIVE", "color: #2ecc71; font-size: 14px");
        console.log("%c🔥 Database URL: https://prrx-chat-default-rtdb.firebaseio.com/", "color: #3498db; font-size: 12px");
        console.log("%c✅ Make sure Firebase Rules are set to .read = true, .write = true", "color: #f39c12; font-size: 12px");
    </script>
</body>
</html>
