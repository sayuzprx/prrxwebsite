<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PRRX Official | Real-Time AI Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(46,204,113,0.05) 0%, transparent 50%);
            animation: rotateBg 20s linear infinite;
        }
        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.05s ease;
            box-shadow: 0 0 10px #2ecc71;
        }
        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(46,204,113,0.6);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transition: transform 0.15s ease, width 0.2s, height 0.2s;
            backdrop-filter: blur(2px);
        }
        @media (max-width: 768px) { .cursor-dot, .cursor-outline { display: none; } }
        
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 1px solid rgba(46,204,113,0.3);
        }
        .logo { 
            font-size: 1.5rem; 
            font-weight: 800; 
            background: linear-gradient(135deg, #fff, #2ecc71); 
            -webkit-background-clip: text; 
            background-clip: text; 
            color: transparent; 
            text-decoration: none;
        }
        .menu { display: flex; gap: 2rem; }
        .menu a { 
            color: #fff; 
            text-decoration: none; 
            font-weight: 500; 
            transition: all 0.3s;
            position: relative;
        }
        .menu a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0%;
            height: 2px;
            background: #2ecc71;
            transition: width 0.3s;
        }
        .menu a:hover::after { width: 100%; }
        .menu a:hover { color: #2ecc71; }
        
        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 6rem 1.5rem 2rem;
            min-height: 100vh;
        }
        
        .chat-layout {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        
        .sidebar {
            width: 280px;
            background: rgba(20,20,20,0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(46,204,113,0.3);
            padding: 1rem;
        }
        .sidebar h3 {
            font-size: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(46,204,113,0.3);
        }
        .sidebar h3 i { color: #2ecc71; margin-right: 0.5rem; }
        
        .online-users {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 1rem;
        }
        .user-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.6rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .user-item:hover { background: rgba(46,204,113,0.15); }
        .user-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .user-name { font-size: 0.85rem; flex: 1; }
        .online-dot {
            width: 8px;
            height: 8px;
            background: #2ecc71;
            border-radius: 50%;
        }
        
        .room-selector {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(46,204,113,0.2);
        }
        .room-btn {
            width: 100%;
            padding: 0.6rem;
            background: rgba(46,204,113,0.1);
            border: 1px solid rgba(46,204,113,0.3);
            border-radius: 40px;
            color: #fff;
            cursor: pointer;
            margin-bottom: 0.5rem;
            transition: all 0.3s;
        }
        .room-btn.active {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-color: transparent;
        }
        .room-btn:hover { transform: scale(1.02); }
        
        .chat-main {
            flex: 1;
            background: rgba(20,20,20,0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(46,204,113,0.3);
            display: flex;
            flex-direction: column;
            height: 70vh;
        }
        
        .chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(46,204,113,0.2);
            background: rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .chat-header h3 { font-size: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .chat-header h3 i { color: #2ecc71; }
        .user-badge {
            font-size: 0.8rem;
            color: #2ecc71;
            background: rgba(46,204,113,0.15);
            padding: 0.3rem 1rem;
            border-radius: 20px;
        }
        
        .chat-messages {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        
        .message {
            display: flex;
            gap: 0.8rem;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        .message-content {
            flex: 1;
            background: rgba(255,255,255,0.05);
            padding: 0.6rem 1rem;
            border-radius: 18px;
            max-width: 70%;
        }
        .message-own { justify-content: flex-end; }
        .message-own .message-content {
            background: rgba(46,204,113,0.15);
            border: 1px solid rgba(46,204,113,0.3);
        }
        .message-sender {
            font-size: 0.7rem;
            color: #2ecc71;
            margin-bottom: 0.2rem;
        }
        .message-text { font-size: 0.85rem; word-wrap: break-word; }
        .message-time {
            font-size: 0.55rem;
            color: #666;
            margin-top: 0.2rem;
            text-align: right;
        }
        .bot-message .message-avatar {
            background: linear-gradient(135deg, #f39c12, #e67e22);
        }
        .bot-message .message-sender { color: #f39c12; }
        .ai-message .message-avatar {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }
        .ai-message .message-sender { color: #3498db; }
        .system-message .message-avatar {
            background: linear-gradient(135deg, #8e44ad, #9b59b6);
        }
        .system-message .message-sender { color: #9b59b6; }
        
        .typing-indicator {
            display: flex;
            gap: 0.3rem;
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            width: fit-content;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #2ecc71;
            border-radius: 50%;
            animation: typing 1s infinite;
        }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }
        
        .chat-input-area {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            border-top: 1px solid rgba(46,204,113,0.2);
        }
        .chat-input-area input {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(46,204,113,0.3);
            border-radius: 30px;
            padding: 0.8rem 1rem;
            color: white;
            outline: none;
        }
        .chat-input-area input:focus { border-color: #2ecc71; }
        .chat-input-area button {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            border-radius: 30px;
            padding: 0.8rem 1.2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .chat-input-area button:hover { transform: scale(1.02); }
        
        .join-screen {
            text-align: center;
            padding: 2.5rem;
            background: rgba(20,20,20,0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            max-width: 450px;
            margin: 0 auto;
        }
        .join-screen i { font-size: 4rem; color: #2ecc71; margin-bottom: 1rem; }
        .join-screen input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(46,204,113,0.3);
            border-radius: 50px;
            color: white;
            margin: 1rem 0;
            text-align: center;
        }
        .join-screen button {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2ecc71;
            color: #0a0a0a;
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 10000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }
        .toast.show { transform: translateX(0); }
        
        @media (max-width: 768px) {
            .navbar { padding: 0.8rem 1rem; }
            .menu { gap: 1rem; }
            .sidebar { width: 100%; }
            .message-content { max-width: 85%; }
        }
    </style>
</head>
<body>

    <div class="bg-animation"></div>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <div class="navbar">
        <a href="index.html" class="logo">PRRX</a>
        <div class="menu">

    <div class="container" id="app"></div>
    <div id="toast" class="toast"></div>

    <script>
        // ========== FIREBASE CONFIGURATION ==========
        const firebaseConfig = {
            apiKey: "AIzaSyCrRkBSSsLJkPQLFSetLSvyfaJ0IihZWKg",
            authDomain: "prrx-chat.firebaseapp.com",
            projectId: "prrx-chat",
            storageBucket: "prrx-chat.firebasestorage.app",
            messagingSenderId: "763130047676",
            appId: "1:763130047676:web:e6566f250e81b9c6b574b9",
            measurementId: "G-SQ0GGFJ704",
            databaseURL: "https://prrx-chat-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const publicMessagesRef = database.ref('public_messages');
        const onlineUsersRef = database.ref('online_users');
        
        // ========== GOOGLE GEMINI AI ==========
        const GEMINI_API_KEY = "AIzaSyB3YDwE7KKnOVB43rtpePFZLBpljv0ld-k";
        const GEMINI_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent";
        
        const PRRX_KNOWLEDGE = `
You are PRRX AI Assistant. Help users with PRRX Gaming Panel.

PRRX INFO:
- Sri Lanka's #1 Free Fire Gaming Panel
- AIMBOT: +++, HEAD, EXTERNAL, DRAG, Mouse Settings
- VISUAL: CHAMS MENU, ESP, 3D CHAMS, Blue/Red CHAMS
- ANTI-CHEAT: Anti Cheates, Anti Report, FPS Boost
- Payment: 300 LKR (1 Week), 850 LKR (1 Month), 2299 LKR (1 Year)
- Download: PRRX.HEX.1.rar from GitHub Releases

Be friendly and concise.
`;
        
        // ========== BOT COMMANDS ==========
        const COMMANDS = `📋 **Available Commands:**
• !help - Show this menu
• !aimbot - AIMBOT guide
• !esp - Visual Enhancement guide
• !price - Pricing information
• !download - Download link
• !tip - Random tip`;
        
        function getBotResponse(message) {
            const m = message.toLowerCase();
            if (m.includes('hi') || m.includes('hello') || m.includes('hey')) {
                return "Hello! 👋 Need help? Type `!help` for commands!";
            }
            if (m.includes('!help') || m.includes('help')) {
                return COMMANDS;
            }
            if (m.includes('!aimbot') || m.includes('aimbot')) {
                return "🎯 **AIMBOT:** Go to Settings Menu > AIM ASSISTANCE. Toggle AIMBOT +++ for max accuracy!";
            }
            if (m.includes('!esp') || m.includes('esp')) {
                return "👁️ **Visual Enhancement:** Use CHAMS MENU for player highlighting and ESP for location tracking!";
            }
            if (m.includes('!price') || m.includes('price')) {
                return "💰 **PRRX Plans:** 1 Week - 300 LKR | 1 Month - 850 LKR | 1 Year - 2299 LKR";
            }
            if (m.includes('!download') || m.includes('download')) {
                return "📥 **Download:** https://github.com/sayuzprx/prrxwebsite/releases/download/v3.2/PRRX.HEX.1.rar";
            }
            if (m.includes('!tip') || m.includes('tip')) {
                return "💡 **Tip:** Use Key Bind to quickly toggle features in-game! Press F2 for AIMBOT!";
            }
            return null;
        }
        
        // ========== WELCOME MESSAGES ==========
        const welcomeMessages = [
            "🎉 Welcome to PRRX Chat! Type `!help` to see available commands!",
            "👋 Hey there! Need help with PRRX? Type `!aimbot` or `!esp`!",
            "🔥 Welcome! Chat with other users or ask the AI Assistant!",
            "💬 You're now in PRRX Live Chat! Be respectful and have fun!",
            "🎮 Ready to dominate? Ask about AIMBOT, ESP, or pricing!"
        ];
        
        function getRandomWelcome() {
            return welcomeMessages[Math.floor(Math.random() * welcomeMessages.length)];
        }
        
        // ========== SEND SYSTEM MESSAGE ==========
        function sendSystemMessage(text) {
            const message = {
                sender: "System",
                text: text,
                timestamp: Date.now(),
                isSystem: true
            };
            publicMessagesRef.push(message);
        }
        
        // ========== FIREBASE - PUBLIC CHAT ==========
        function sendPublicMessage(text, isBot = false, isSystem = false) {
            if (!text.trim() || !currentUser) return;
            
            const message = {
                sender: isSystem ? "System" : (isBot ? "PRRX Bot" : currentUser.username),
                text: text.trim(),
                timestamp: Date.now(),
                isBot: isBot,
                isSystem: isSystem
            };
            publicMessagesRef.push(message);
        }
        
        function loadPublicMessages() {
            publicMessagesRef.off();
            publicMessagesRef.on('child_added', (snapshot) => {
                const msg = snapshot.val();
                const isOwn = currentUser && msg.sender === currentUser.username && !msg.isBot && !msg.isSystem;
                const messagesDiv = document.getElementById('messages');
                if (messagesDiv && currentRoom === 'public') {
                    let msgClass = '';
                    if (msg.isBot) msgClass = 'bot-message';
                    else if (msg.isSystem) msgClass = 'system-message';
                    
                    const msgHtml = `
                        <div class="message ${isOwn ? 'message-own' : ''} ${msgClass}">
                            <div class="message-avatar">${msg.isBot ? '<i class="fas fa-robot"></i>' : (msg.isSystem ? '<i class="fas fa-info-circle"></i>' : msg.sender.charAt(0).toUpperCase())}</div>
                            <div class="message-content">
                                <div class="message-sender">${escapeHtml(msg.sender)} ${msg.isBot ? '(Bot)' : (msg.isSystem ? '(System)' : '')}</div>
                                <div class="message-text">${escapeHtml(msg.text).replace(/\n/g, '<br>')}</div>
                                <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                            </div>
                        </div>
                    `;
                    messagesDiv.insertAdjacentHTML('beforeend', msgHtml);
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
            });
        }
        
        // ========== ONLINE USERS ==========
        function updateOnlineStatus() {
            if (!currentUser) return;
            const userRef = onlineUsersRef.child(currentUser.username);
            userRef.set({
                username: currentUser.username,
                lastSeen: Date.now(),
                online: true
            });
            userRef.onDisconnect().remove();
        }
        
        function loadOnlineUsers() {
            onlineUsersRef.on('value', (snapshot) => {
                const users = [];
                snapshot.forEach((child) => {
                    const user = child.val();
                    if (user.online && user.username !== currentUser?.username) {
                        users.push(user);
                    }
                });
                onlineUsers = users;
                renderOnlineUsers();
            });
        }
        
        let onlineUsers = [];
        
        // ========== AI RESPONSE ==========
        async function getAIResponse(userMessage) {
            try {
                const contextMessage = PRRX_KNOWLEDGE + `\n\nUser: ${userMessage}\n\nPRRX AI:`;
                const response = await fetch(`${GEMINI_URL}?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: contextMessage }] }],
                        generationConfig: { temperature: 0.7, maxOutputTokens: 200 }
                    })
                });
                const data = await response.json();
                if (data.error) return "I'm here to help! Ask about AIMBOT, ESP, Anti-Cheat, pricing, or download.";
                return data.candidates[0].content.parts[0].text.replace(/PRRX AI:/gi, '').trim();
            } catch (error) {
                return "Sorry, having trouble connecting. Please try again!";
            }
        }
        
        // ========== CHAT STATE ==========
        let currentUser = null;
        let currentRoom = 'public';
        
        // ========== PRIVATE AI CHAT ==========
        let aiMessages = [];
        
        function addAIMessage(sender, text, isOwn = false) {
            const msg = {
                sender: sender,
                text: text,
                timestamp: Date.now(),
                isOwn: isOwn,
                isAI: !isOwn
            };
            aiMessages.push(msg);
            renderAIMessages();
        }
        
        function renderAIMessages() {
            const messagesDiv = document.getElementById('messages');
            if (!messagesDiv || currentRoom !== 'ai_assistant') return;
            
            messagesDiv.innerHTML = aiMessages.map(msg => `
                <div class="message ${msg.isOwn ? 'message-own' : ''} ${msg.isAI ? 'ai-message' : ''}">
                    <div class="message-avatar">${msg.isAI ? '<i class="fas fa-brain"></i>' : msg.sender.charAt(0).toUpperCase()}</div>
                    <div class="message-content">
                        <div class="message-sender">${escapeHtml(msg.sender)} ${msg.isAI ? '(AI)' : ''}</div>
                        <div class="message-text">${escapeHtml(msg.text).replace(/\n/g, '<br>')}</div>
                        <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                    </div>
                </div>
            `).join('');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function showAITypingIndicator() {
            const messagesDiv = document.getElementById('messages');
            if (!messagesDiv) return;
            const typing = document.createElement('div');
            typing.id = 'typing-indicator';
            typing.className = 'typing-indicator';
            typing.innerHTML = '<span></span><span></span><span></span><span style="color:#888;">AI is thinking...</span>';
            messagesDiv.appendChild(typing);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function removeAITypingIndicator() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }
        
        async function sendAIMessage(text) {
            if (!text.trim() || !currentUser) return;
            addAIMessage(currentUser.username, text, true);
            
            showAITypingIndicator();
            const aiResponse = await getAIResponse(text);
            removeAITypingIndicator();
            addAIMessage("PRRX AI", aiResponse, false);
        }
        
        // ========== SEND MESSAGE FUNCTION ==========
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || !currentUser) return;
            
            if (currentRoom === 'public') {
                sendPublicMessage(message);
                input.value = '';
                
                const botResponse = getBotResponse(message);
                if (botResponse) {
                    setTimeout(() => sendPublicMessage(botResponse, true), 500);
                }
            } else if (currentRoom === 'ai_assistant') {
                input.value = '';
                await sendAIMessage(message);
            }
        }
        
        // ========== ROOM SWITCHING ==========
        function joinPublicChat() {
            currentRoom = 'public';
            document.getElementById('roomName').textContent = '💬 Public Chat (Firebase Real-Time)';
            document.getElementById('messages').innerHTML = '';
            loadPublicMessages();
            updateActiveRoomButtons();
        }
        
        function joinAIChat() {
            currentRoom = 'ai_assistant';
            document.getElementById('roomName').textContent = '🤖 AI Assistant (Gemini)';
            document.getElementById('messages').innerHTML = '';
            renderAIMessages();
            updateActiveRoomButtons();
        }
        
        function updateActiveRoomButtons() {
            const publicBtn = document.getElementById('publicRoomBtn');
            const aiBtn = document.getElementById('aiRoomBtn');
            if (publicBtn && aiBtn) {
                if (currentRoom === 'public') {
                    publicBtn.classList.add('active');
                    aiBtn.classList.remove('active');
                } else {
                    aiBtn.classList.add('active');
                    publicBtn.classList.remove('active');
                }
            }
        }
        
        function renderOnlineUsers() {
            const container = document.getElementById('onlineUsersList');
            if (!container) return;
            container.innerHTML = onlineUsers.map(user => `
                <div class="user-item" onclick="showToast('Private chat coming soon!')">
                    <div class="user-avatar">${user.username.charAt(0).toUpperCase()}</div>
                    <div class="user-name">${user.username}</div>
                    <div class="online-dot"></div>
                </div>
            `).join('');
            document.getElementById('onlineCount').textContent = onlineUsers.length;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        function renderChatInterface() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="chat-layout">
                    <div class="sidebar">
                        <h3><i class="fas fa-users"></i> Online Users (<span id="onlineCount">0</span>)</h3>
                        <div class="online-users" id="onlineUsersList"></div>
                        
                        <div class="room-selector">
                            <button class="room-btn active" id="publicRoomBtn" onclick="joinPublicChat()">
                                <i class="fas fa-globe"></i> Public Chat (Firebase)
                            </button>
                            <button class="room-btn" id="aiRoomBtn" onclick="joinAIChat()">
                                <i class="fas fa-brain"></i> AI Assistant (Gemini)
                            </button>
                        </div>
                    </div>
                    
                    <div class="chat-main">
                        <div class="chat-header">
                            <h3><i class="fas fa-comments"></i> <span id="roomName">💬 Public Chat (Firebase Real-Time)</span></h3>
                            <div class="user-badge"><i class="fas fa-user"></i> ${currentUser.username}</div>
                        </div>
                        <div class="chat-messages" id="messages"></div>
                        <div class="chat-input-area">
                            <input type="text" id="messageInput" placeholder="Type a message... Type !help for commands" onkeypress="if(event.key==='Enter') sendMessage()">
                            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Send</button>
                        </div>
                    </div>
                </div>
            `;
            
            joinPublicChat();
        }
        
        function showJoinScreen() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="join-screen">
                    <i class="fas fa-comments"></i>
                    <h2>PRRX Real-Time Chat</h2>
                    <p style="color: #888; margin-bottom: 1rem;">💬 Public Chat (Firebase) | 🤖 AI Assistant (Gemini)</p>
                    <p style="color: #2ecc71; margin-bottom: 1rem;">🔥 Messages sync across ALL users in real-time!</p>
                    <input type="text" id="usernameInput" placeholder="Enter your username" maxlength="20">
                    <button id="joinBtn">Join Chat</button>
                </div>
            `;
            
            document.getElementById('joinBtn').onclick = () => {
                const username = document.getElementById('usernameInput').value.trim();
                if (!username) { showToast("Please enter a username"); return; }
                if (username.length < 2) { showToast("Username must be at least 2 characters"); return; }
                
                currentUser = { username: username };
                
                // Send welcome message
                const welcomeText = getRandomWelcome();
                sendPublicMessage(welcomeText, false, false);
                
                // Send commands list
                setTimeout(() => {
                    sendPublicMessage(COMMANDS, true);
                }, 800);
                
                renderChatInterface();
                updateOnlineStatus();
                loadOnlineUsers();
            };
            
            document.getElementById('usernameInput').onkeypress = (e) => {
                if (e.key === 'Enter') document.getElementById('joinBtn').click();
            };
        }
        
        // ========== SECURITY ==========
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) {
                e.preventDefault();
                showToast("🔒 DevTools blocked");
                return false;
            }
        });
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); showToast("🔒 Right-click disabled"); return false; });
        
        // Cursor
        if (window.innerWidth > 768) {
            const cd = document.querySelector('.cursor-dot');
            const co = document.querySelector('.cursor-outline');
            document.addEventListener('mousemove', (e) => {
                cd.style.transform = `translate(${e.clientX - 4}px, ${e.clientY - 4}px)`;
                co.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
            });
        }
        
        // ========== INIT ==========
        showJoinScreen();
        
        window.sendMessage = sendMessage;
        window.joinPublicChat = joinPublicChat;
        window.joinAIChat = joinAIChat;
        
        console.log("%c💬 PRRX REAL-TIME CHAT ACTIVE", "color: #2ecc71; font-size: 14px");
        console.log("%c🔥 Welcome message appears when anyone joins!", "color: #f39c12; font-size: 12px");
        console.log("%c📡 Messages sync across ALL users instantly!", "color: #3498db; font-size: 12px");
    </script>
</body>
</html>
